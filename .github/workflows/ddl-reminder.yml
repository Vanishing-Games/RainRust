name: DDL 来了😰 DDL 来啦😰

on:
  schedule:
    - cron: '0 9 * * *' # 每天 09:00 UTC
  pull_request:
    branches: [develop, main]
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  reminder:
    runs-on: ubuntu-latest
    steps:
      # -------------------------------
      # 1️⃣ 获取 Project 相关 ID
      # -------------------------------
      - name: 获取 Project 相关 ID
        id: get_project
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_PAT }}
          script: |
            const org = "Vanishing-Games";
            const projectName = "创似我算了";

            const result = await github.graphql(`
              query {
                organization(login: "${org}") {
                  projectsV2(first: 20) {
                    nodes {
                      id
                      title
                      fields(first: 20) {
                        nodes {
                          __typename
                          ... on ProjectV2FieldCommon { id name }
                          ... on ProjectV2SingleSelectField { options { id name } }
                        }
                      }
                    }
                  }
                }
              }
            `);

            const project = result.organization.projectsV2.nodes.find(p => p.title === projectName);
            if (!project) throw new Error("未找到目标 Project: " + projectName);

            const fields = project.fields.nodes.map(f => ({
              id: f.id,
              name: f.name,
              options: f.__typename === "ProjectV2SingleSelectField" ? f.options : []
            }));

            const priorityField = fields.find(f => f.name === "优先级");
            const ddlField = fields.find(f => f.name === "DDL");
            const p2Option = priorityField.options.find(o => o.name === "P2");

            if (!priorityField) throw new Error("未找到优先级字段");
            if (!ddlField) throw new Error("未找到DDL字段");
            if (!p2Option) throw new Error("未找到 P2 选项");

            // 设置 step outputs
            core.setOutput("project_id", project.id);
            core.setOutput("priority_field_id", priorityField.id);
            core.setOutput("p2_option_id", p2Option.id);
            core.setOutput("ddl_field_id", ddlField.id);

            // 输出到 GitHub Summary
            core.summary
              .addHeading('📌 获取到的 Project 相关信息')
              .addList([
                `Project 名称: ${project.title}`,
                `Project ID: ${project.id}`,
                `优先级字段 ID: ${priorityField.id}`,
                `P2 选项 ID: ${p2Option.id}`,
                `DDL 字段 ID: ${ddlField.id}`
              ])
              .write();

      # -------------------------------
      # 2️⃣ 检查 DDL 并发送提醒
      # -------------------------------
      - name: 检查 DDL 并发送提醒
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_PAT }}
          script: |
            const projectId = "${{ steps.get_project.outputs.project_id }}";
            const ddlFieldId = "${{ steps.get_project.outputs.ddl_field_id }}";
            const coreTeam = "Vanishing-Games/core-developers";
            const today = new Date();
            today.setHours(0,0,0,0);

            // 查询 ProjectV2 Items
            const result = await github.graphql(`
              query {
                node(id: "${projectId}") {
                  ... on ProjectV2 {
                    items(first: 100) {
                      nodes {
                        id
                        content {
                          ... on Issue {
                            number
                            state
                            repository { owner { login } name }
                            assignees(first: 10) { nodes { login } }
                          }
                        }
                        fieldValues(first: 20) {
                          nodes {
                            ... on ProjectV2ItemFieldDateValue {
                              date
                              field { ... on ProjectV2FieldCommon { id name } }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            `);

            const summaryRows = [];

            for (const item of result.node.items.nodes) {
              if (!item.content) continue;
              if (item.content.state === "CLOSED") continue; // ✅ 已关闭的 Issue 跳过

              // 找到 DDL 字段值
              const ddlField = item.fieldValues.nodes.find(f => f.field?.id === ddlFieldId);
              if (!ddlField?.date) continue;

              const ddl = new Date(ddlField.date);
              ddl.setHours(0,0,0,0);
              const diffDays = Math.floor((ddl - today) / 86400000);

              const assignees = item.content.assignees.nodes.map(a => `@${a.login}`).join(' ') || '未分配人员';
              let message = null;

              if (diffDays < 0) {
                message = `${assignees} 🚨 任务已逾期，请尽快处理！\n@${coreTeam}`;
              } else if (diffDays === 0) {
                message = `${assignees} ⏰ 今天是截止日，请完成任务`;
              } else if ([7,3,1].includes(diffDays)) {
                message = `${assignees} ⏳ 距离截止日期还有 ${diffDays} 天，请注意`;
              }

              if (!message) continue;

              await github.rest.issues.createComment({
                owner: item.content.repository.owner.login,
                repo: item.content.repository.name,
                issue_number: item.content.number,
                body: message
              });

              const issueUrl = `https://github.com/${item.content.repository.owner.login}/${item.content.repository.name}/issues/${item.content.number}`;
              summaryRows.push(`| [#${item.content.number}](${issueUrl}) | ${item.content.repository.name} | ${message} |`);
            }

            // 输出到 GitHub Summary
            if (summaryRows.length === 0) {
              core.summary.addRaw('✅ 今日没有需要提醒的任务').write();
            } else {
              // 将每行内容中的换行符替换为 <br>
              const safeRows = summaryRows.map(row => row.replace(/\n/g, '<br>'));
                    
              const tableContent = `
            | Issue | 仓库 | 提醒内容 |
            | --- | --- | --- |
            ${safeRows.join('\n')}
            `;
                    
              core.summary
                .addHeading('📣 DDL 提醒发送情况')
                .addRaw(tableContent)
                .write();
            }
