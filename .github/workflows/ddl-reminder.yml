name: DDL 来了😰 DDL 来啦😰

on:
  schedule:
    - cron: '0 9 * * *' # 每天 09:00 UTC
  workflow_dispatch:

jobs:
  reminder:
    runs-on: ubuntu-latest
    steps:
      - name: 获取 Project 相关 ID
        id: get_project
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_PAT }}
          script: |
            const org = "Vanishing-Games";
            const projectName = "创似我算了";
            const result = await github.graphql(`
              query {
                organization(login: "${org}") {
                  projectsV2(first: 20) {
                    nodes {
                      id
                      title
                      fields(first: 20) {
                        nodes {
                          __typename
                          ... on ProjectV2FieldCommon { id name }
                          ... on ProjectV2SingleSelectField { options { id name } }
                        }
                      }
                    }
                  }
                }
              }
            `);
            const project = result.organization.projectsV2.nodes.find(p => p.title === projectName);
            if (!project) throw new Error("未找到目标 Project: " + projectName);
            const fields = project.fields.nodes.map(f => ({
              id: f.id,
              name: f.name,
              options: f.__typename === "ProjectV2SingleSelectField" ? f.options : []
            }));
            const ddlField = fields.find(f => f.name === "DDL");
            core.setOutput("project_id", project.id);
            core.setOutput("ddl_field_id", ddlField.id);

      - name: 检查 DDL 并发送提醒
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_PAT }}
          script: |
            const projectId = "${{ steps.get_project.outputs.project_id }}";
            const ddlFieldId = "${{ steps.get_project.outputs.ddl_field_id }}";
            const coreTeam = "Vanishing-Games/core-developers";
            const today = new Date();
            today.setHours(0,0,0,0);

            const result = await github.graphql(`
              query {
                node(id: "${projectId}") {
                  ... on ProjectV2 {
                    items(first: 100) {
                      nodes {
                        id
                        content {
                          ... on Issue {
                            number
                            state
                            id
                            labels(first: 20) { nodes { name } }
                            repository { owner { login } name }
                            assignees(first: 10) { nodes { login } }
                          }
                        }
                        fieldValues(first: 20) {
                          nodes {
                            ... on ProjectV2ItemFieldDateValue {
                              date
                              field { ... on ProjectV2FieldCommon { id name } }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            `);

            const summaryRows = [];

            for (const item of result.node.items.nodes) {
              if (!item.content || item.content.state === "CLOSED" || !item.content.repository) continue;

              const owner = item.content.repository.owner.login;
              const repo = item.content.repository.name;
              const issueNumber = item.content.number;
              const assignees = item.content.assignees.nodes.map(a => `@${a.login}`).join(' ') || '未分配人员';
              const titlePrefix = `Issue #${issueNumber} DDL 提醒[Action自动生成]`;
              const currentLabels = item.content.labels.nodes.map(l => l.name);
              
              if (currentLabels.includes('Milk Tea')) {
                console.log(`Issue #${issueNumber}: 跳过奶茶请客任务。`);
                continue;
              }

              const ddlField = item.fieldValues.nodes.find(f => f.field?.id === ddlFieldId);
              const issueUrl = `https://github.com/${owner}/${repo}/issues/${issueNumber}`;
              
              // --- 1. 标签自愈与缺失检查 ---
              if (ddlField?.date) {
                if (currentLabels.includes('needs: ddl')) {
                  await github.rest.issues.removeLabel({ owner, repo, issue_number: issueNumber, name: 'needs: ddl' }).catch(() => {});
                }
              } else {
                if (!currentLabels.includes('needs: ddl')) {
                  await github.rest.issues.addLabels({ owner, repo, issue_number: issueNumber, labels: ['needs: ddl'] });
                  await github.rest.issues.createComment({ owner, repo, issue_number: issueNumber, 
                    body: `${titlePrefix} \n ${assignees} ⚠️ 尚未设置 DDL，请补全以纳入监控。` 
                  });
                }
                continue;
              }

              // --- 2. 核心 DDL 检查 ---
              const ddl = new Date(ddlField.date);
              ddl.setHours(0,0,0,0);
              const diffDays = Math.floor((ddl - today) / 86400000);
              let message = null;
              let isOverdue = diffDays < 0;

              // 自愈：已延期任务移除逾期标签
              if (!isOverdue && currentLabels.includes('ddl: overdue')) {
                await github.rest.issues.removeLabel({ owner, repo, issue_number: issueNumber, name: 'ddl: overdue' }).catch(() => {});
              }

              if (isOverdue) {
                const comments = await github.rest.issues.listComments({ owner, repo, issue_number: issueNumber, per_page: 50 });
                const alreadyNotified = comments.data.some(c => c.body.includes('奶茶喝了'));

                if (!alreadyNotified) {
                  message = `${titlePrefix} \n ${assignees} 🚨💥 **DDL到此为止了**！💀🛑\n@${coreTeam} 🍵🧋有**奶茶**喝了🥤🎉`;
                }
                if (!currentLabels.includes('ddl: overdue')) {
                  await github.rest.issues.addLabels({ owner, repo, issue_number: issueNumber, labels: ['ddl: overdue'] });
                }
              } else if (diffDays === 0) {
                message = `${titlePrefix} \n ${assignees} ⏰⚡️ **沟槽**的**DDL**要**结束**了‼️🔥💨`;
              } else if ([7,3,1].includes(diffDays)) {
                message = `${titlePrefix} \n ${assignees} ⏳📝 DDL **${diffDays}** 天 📅⚠️💪`;
              }

              if (message) {
                await github.rest.issues.createComment({ owner, repo, issue_number: issueNumber, body: message });
                summaryRows.push(`| [#${issueNumber}](${issueUrl}) | ${repo} | ${message.split('\n')[1].trim()} |`);
              }
            }

            // 输出 Summary
            const summary = core.summary.addHeading('⏰ DDL 提醒执行报告');
            if (summaryRows.length > 0) {
              summary.addTable([
                ['Issue', '仓库', '提醒内容'],
                ...summaryRows.map(row => row.split('|').filter(s => s.trim()).map(s => s.trim()))
              ]);
            } else {
              summary.addRaw('✅ 今日无 DDL 紧急提醒。');
            }
            await summary.write();
