name: 🚀 主CI/CD流水线

on:
  # Pull Request 触发 - develop和main分支
  pull_request:
    branches: [develop, main]
    types: [opened, synchronize, reopened, ready_for_review]

  # Push 触发 - 仅release分支和develop分支的直接推送
  # 注意：当创建PR时，不会触发目标分支的push事件，只会触发pull_request事件
  # 排除PR分支的推送，避免与pull_request事件重复
  push:
    branches: 
      - develop
      - 'release/**'
    tags:
      - 'v*.*.*'
    # 排除.github目录的更改，避免工作流更新时的无意义触发
    paths-ignore:
      - '.github/workflows/**'
      - '.github/config/**'
      - '**.md'

  # 定时触发 - 北京时间每周日晚上7点 (UTC 11:00)
  schedule:
    - cron: '0 11 * * 0'

  # 手动触发
  workflow_dispatch:
    inputs:
      skip_tests:
        description: '跳过单元测试'
        required: false
        default: false
        type: boolean
      skip_build:
        description: '跳过构建测试'  
        required: false
        default: false
        type: boolean
      skip_style:
        description: '跳过代码风格检查'
        required: false
        default: false
        type: boolean

# 权限配置
permissions:
  contents: read
  actions: read
  pages: write
  id-token: write

jobs:
  # =============================================================================
  # 阶段0: 流程预测 - 分析配置并预测将执行的步骤
  # =============================================================================
  flow-prediction:
    name: 📋 流程预测
    runs-on: ubuntu-latest
    outputs:
      should_run_tests: ${{ steps.predict.outputs.should_run_tests }}
      should_run_build: ${{ steps.predict.outputs.should_run_build }}
      should_run_style: ${{ steps.predict.outputs.should_run_style }}
      should_run_deploy: ${{ steps.predict.outputs.should_run_deploy }}
      should_deploy_pages: ${{ steps.predict.outputs.should_deploy_pages }}
      build_type: ${{ steps.predict.outputs.build_type }}
      pipeline_description: ${{ steps.predict.outputs.pipeline_description }}
      skip_reason: ${{ steps.predict.outputs.skip_reason }}
      test_retry_count: ${{ steps.predict.outputs.test_retry_count }}
      build_retry_count: ${{ steps.predict.outputs.build_retry_count }}
      test_retry_delay: ${{ steps.predict.outputs.test_retry_delay }}
      build_retry_delay: ${{ steps.predict.outputs.build_retry_delay }}
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 📖 加载流水线配置
        id: load-config
        run: |
          echo "🔧 加载流水线配置文件..."
          
          # 检查配置文件是否存在
          if [[ ! -f ".github/workflows/Pipeline Config/pipeline-settings.json" ]]; then
            echo "❌ 错误: 流水线配置文件不存在"
            exit 1
          fi
          
          # 验证JSON格式
          if ! jq empty ".github/workflows/Pipeline Config/pipeline-settings.json" 2>/dev/null; then
            echo "❌ 错误: 流水线配置文件JSON格式无效"
            exit 1
          fi
          
          echo "✅ 配置文件加载成功"
          
          # 输出详细配置摘要
          echo "📋 项目信息:"
          jq -r '.project | "  名称: \(.name)\n  版本: \(.unityVersion)\n  描述: \(.description)"' ".github/workflows/Pipeline Config/pipeline-settings.json"
          
          echo ""
          echo "🔧 流水线作业配置:"
          jq -r '.jobs | to_entries[] | select(.key != "description") | "  \(.value.name): \(.value.description) (超时: \(.value.timeout)分钟, 失败处理: \(.value.failureAction))"' ".github/workflows/Pipeline Config/pipeline-settings.json"
          
          echo ""
          echo "🎛️ 支持的PR关键字:"
          jq -r '.triggers.skipKeywords.keywords[] | "  \(.keyword): \(.description)"' ".github/workflows/Pipeline Config/pipeline-settings.json"
          
          echo ""
          echo "🔑 必需的Secrets:"
          jq -r '.requirements.secrets.required[] | "  \(.name): \(.description)"' ".github/workflows/Pipeline Config/pipeline-settings.json"

      - name: 🎯 分析触发条件和预测流程
        id: predict
        run: |
          echo "🔍 分析当前触发条件..."
          
          # 获取事件类型和相关信息
          EVENT_NAME="${{ github.event_name }}"
          REF_NAME="${{ github.ref_name }}"
          # PR 事件用 base_ref（目标分支）判断，push/tag 事件用 ref_name
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            BRANCH_NAME="${{ github.base_ref }}"
          else
            BRANCH_NAME="${{ github.ref_name }}"
          fi
          
          # 检查是否为重复触发（同时有PR和push事件）
          if [[ "$EVENT_NAME" == "push" && "$REF_NAME" == "develop" ]]; then
            # 检查当前commit是否有关联的开放PR
            echo "🔍 检查是否存在重复的PR触发..."
            # 如果是push到develop且可能有PR打开，我们优先让PR事件处理
            echo "⚠️ 这是develop分支的push事件，可能与PR事件重复"
            echo "💡 建议：如果有活跃的PR，优先使用PR事件的工作流"
          fi
          
          # 检查PR标题或最新commit消息中的控制关键字
          SKIP_ALL=false
          SKIP_TESTS=false
          SKIP_BUILD=false
          SKIP_FORMAT=false
          ADD_TESTS=false
          ADD_BUILD=false
          ADD_DEPLOY=false
          SKIP_REASON=""
          
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            PR_TITLE="${{ github.event.pull_request.title }}"
            COMMIT_MSG="${{ github.event.pull_request.title }}"
            echo "📝 PR标题: $PR_TITLE"
          else
            COMMIT_MSG="${{ github.event.head_commit.message }}"
            echo "📝 Commit消息: $COMMIT_MSG"
          fi
          
          # 检查跳过关键字
          if [[ "$COMMIT_MSG" =~ \[SKIP\ CICD\] ]]; then
            SKIP_ALL=true
            SKIP_REASON="PR标题/commit消息包含 [SKIP CICD]"
          elif [[ "$COMMIT_MSG" =~ \[SKIP\ FORMAT\] ]]; then
            SKIP_FORMAT=true
            SKIP_REASON="PR标题/commit消息包含 [SKIP FORMAT]"
          elif [[ "$COMMIT_MSG" =~ \[SKIP\ TEST\] ]]; then
            SKIP_TESTS=true
            SKIP_REASON="PR标题/commit消息包含 [SKIP TEST]"  
          elif [[ "$COMMIT_MSG" =~ \[SKIP\ BUILD\] ]]; then
            SKIP_BUILD=true
            SKIP_REASON="PR标题/commit消息包含 [SKIP BUILD]"
          fi
          
          # 检查增加关键字
          if [[ "$COMMIT_MSG" =~ \[ADD\ TEST\] ]]; then
            ADD_TESTS=true
            echo "🔍 检测到 [ADD TEST] 关键字"
          fi
          if [[ "$COMMIT_MSG" =~ \[ADD\ BUILD\] ]]; then
            ADD_BUILD=true
            echo "🔍 检测到 [ADD BUILD] 关键字"
          fi
          if [[ "$COMMIT_MSG" =~ \[ADD\ DEPLOY\] ]]; then
            ADD_DEPLOY=true
            echo "🔍 检测到 [ADD DEPLOY] 关键字"
          fi
          
          # 检查手动输入参数
          if [[ "${{ github.event.inputs.skip_tests }}" == "true" ]]; then
            SKIP_TESTS=true
            SKIP_REASON="手动选择跳过测试"
          fi
          if [[ "${{ github.event.inputs.skip_build }}" == "true" ]]; then
            SKIP_BUILD=true  
            SKIP_REASON="手动选择跳过构建"
          fi
          if [[ "${{ github.event.inputs.skip_style }}" == "true" ]]; then
            SKIP_STYLE=true
            SKIP_REASON="手动选择跳过代码检查"
          fi
          
          echo "🎯 触发条件分析:"
          echo "  事件类型: $EVENT_NAME"
          echo "  分支名称: $BRANCH_NAME"
          echo "  引用名称: $REF_NAME"
          
          # 根据分支和事件类型决定执行的步骤
          SHOULD_RUN_TESTS=true
          SHOULD_RUN_BUILD=false
          SHOULD_RUN_STYLE=true
          SHOULD_RUN_DEPLOY=false
          SHOULD_DEPLOY_PAGES=false
          BUILD_TYPE="preview"
          PIPELINE_DESC=""

          if [[ "$SKIP_ALL" == "true" ]]; then
            # 完全跳过
            SHOULD_RUN_TESTS=false
            SHOULD_RUN_BUILD=false
            SHOULD_RUN_STYLE=false
            SHOULD_RUN_DEPLOY=false
            SHOULD_DEPLOY_PAGES=false
            PIPELINE_DESC="❌ 跳过所有CI/CD流程"

          elif [[ "$EVENT_NAME" == "push" && "$GITHUB_REF_TYPE" == "tag" && "$REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-release$ ]]; then
            # vx.y.z-release 格式 Tag - 正式发布到 Release + GitHub Pages
            SHOULD_RUN_TESTS=true
            SHOULD_RUN_BUILD=true
            SHOULD_RUN_STYLE=true
            SHOULD_RUN_DEPLOY=true
            SHOULD_DEPLOY_PAGES=true
            BUILD_TYPE="release"
            # 提取纯版本号 (v1.2.3-release -> 1.2.3)
            RELEASE_VERSION=$(echo "$REF_NAME" | sed 's/^v//;s/-release$//')
            PIPELINE_DESC="🚀 Release正式发布流程 (版本: $RELEASE_VERSION) (代码检测 → 单元测试 → 构建测试 → 发布Release → 部署Pages)"
            echo "release_version=$RELEASE_VERSION" >> $GITHUB_OUTPUT

          elif [[ "$EVENT_NAME" == "push" && "$GITHUB_REF_TYPE" == "tag" && "$REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            # 纯 vx.y.z 格式 Tag - 完整流水线但不部署
            SHOULD_RUN_TESTS=true
            SHOULD_RUN_BUILD=true
            SHOULD_RUN_STYLE=true
            SHOULD_RUN_DEPLOY=false
            SHOULD_DEPLOY_PAGES=false
            BUILD_TYPE="release_candidate"
            PIPELINE_DESC="🏷️ Tag验证流程 (代码检测 → 单元测试 → 构建测试)"

          elif [[ "$BRANCH_NAME" =~ ^release/ ]]; then
            # Release分支 - 完整CI/CD流程
            SHOULD_RUN_TESTS=true
            SHOULD_RUN_BUILD=true
            SHOULD_RUN_STYLE=true
            SHOULD_RUN_DEPLOY=true
            BUILD_TYPE="release"
            PIPELINE_DESC="🚀 Release完整流程 (代码检测 → 单元测试 → 构建测试 → 部署Pages)"
            
          elif [[ "$BRANCH_NAME" == "develop" && "$EVENT_NAME" == "pull_request" ]]; then
            # Develop分支PR - CI验证流程
            echo "🔍 检测到 develop 分支 PR，应用默认配置"
            SHOULD_RUN_TESTS=true
            SHOULD_RUN_BUILD=true
            SHOULD_RUN_STYLE=true
            BUILD_TYPE="preview"
            PIPELINE_DESC="📝 Develop PR验证流程 (代码检测 → 单元测试 → 构建测试)"
            
          elif [[ "$BRANCH_NAME" == "main" && "$EVENT_NAME" == "pull_request" ]]; then
            # Main分支PR - 完整CI流程  
            SHOULD_RUN_TESTS=true
            SHOULD_RUN_BUILD=true
            SHOULD_RUN_STYLE=true
            BUILD_TYPE="release_candidate"
            PIPELINE_DESC="🔨 Main PR验证流程 (代码检测 → 单元测试 → 构建测试)"
            
          elif [[ "$BRANCH_NAME" == "develop" && "$EVENT_NAME" == "push" ]]; then
            # Develop分支推送 - CI流程
            SHOULD_RUN_TESTS=true
            SHOULD_RUN_BUILD=true  
            SHOULD_RUN_STYLE=true
            BUILD_TYPE="preview"
            PIPELINE_DESC="🔄 Develop分支状态验证 (代码检测 → 单元测试 → 构建测试)"
            
          elif [[ "$EVENT_NAME" == "schedule" ]]; then
            # 定时构建 - 仅构建测试
            SHOULD_RUN_TESTS=false
            SHOULD_RUN_BUILD=true
            SHOULD_RUN_STYLE=false
            BUILD_TYPE="preview"  
            PIPELINE_DESC="⏰ 定时构建流程 (构建测试)"
            
          else
            # 其他情况 - 基础CI
            SHOULD_RUN_TESTS=true
            SHOULD_RUN_BUILD=false
            SHOULD_RUN_STYLE=true
            BUILD_TYPE="preview"
            PIPELINE_DESC="🧪 基础CI流程 (代码检测 → 单元测试)"
          fi
          
          # 应用跳过设置
          if [[ "$SKIP_TESTS" == "true" ]]; then
            SHOULD_RUN_TESTS=false
          fi
          if [[ "$SKIP_BUILD" == "true" ]]; then
            SHOULD_RUN_BUILD=false
            SHOULD_RUN_DEPLOY=false
          fi
          if [[ "$SKIP_FORMAT" == "true" ]]; then
            SHOULD_RUN_STYLE=false
          fi
          if [[ "$SKIP_STYLE" == "true" ]]; then
            SHOULD_RUN_STYLE=false
          fi
          
          # 应用增加设置
          ADD_REASONS=""
          if [[ "$ADD_TESTS" == "true" ]]; then
            SHOULD_RUN_TESTS=true
            echo "✅ 应用 [ADD TEST]：启用单元测试"
            ADD_REASONS="${ADD_REASONS}[ADD TEST] "
          fi
          if [[ "$ADD_BUILD" == "true" ]]; then
            SHOULD_RUN_BUILD=true
            echo "✅ 应用 [ADD BUILD]：启用构建测试"
            ADD_REASONS="${ADD_REASONS}[ADD BUILD] "
          fi
          if [[ "$ADD_DEPLOY" == "true" ]]; then
            SHOULD_RUN_DEPLOY=true
            echo "✅ 应用 [ADD DEPLOY]：启用部署"
            ADD_REASONS="${ADD_REASONS}[ADD DEPLOY] "
            # 如果要部署但没有构建，自动启用构建
            if [[ "$SHOULD_RUN_BUILD" == "false" ]]; then
              SHOULD_RUN_BUILD=true
              echo "✅ 自动启用构建（部署需要构建产物）"
            fi
          fi
          
          # 更新跳过/增加原因
          if [[ -n "$ADD_REASONS" ]]; then
            if [[ -z "$SKIP_REASON" ]]; then
              SKIP_REASON="PR标题包含增强关键字: $ADD_REASONS"
            else
              SKIP_REASON="${SKIP_REASON}; 同时包含增强关键字: $ADD_REASONS"
            fi
          fi
          
          echo ""
          echo "🔧 关键字状态:"
          echo "  ADD_TESTS: $ADD_TESTS"
          echo "  ADD_BUILD: $ADD_BUILD"
          echo "  ADD_DEPLOY: $ADD_DEPLOY"
          echo "  SKIP_TESTS: $SKIP_TESTS"
          echo "  SKIP_BUILD: $SKIP_BUILD"
          echo "  SKIP_FORMAT: $SKIP_FORMAT"
          echo ""
          echo "📋 流程预测结果:"
          echo "  构建类型: $BUILD_TYPE"
          echo "  执行描述: $PIPELINE_DESC"
          echo "  单元测试: $SHOULD_RUN_TESTS"
          echo "  构建测试: $SHOULD_RUN_BUILD"
          echo "  代码检查: $SHOULD_RUN_STYLE"
          echo "  Release发布: $SHOULD_RUN_DEPLOY"
          echo "  Pages部署: $SHOULD_DEPLOY_PAGES"

          if [[ -n "$SKIP_REASON" ]]; then
            echo "  跳过原因: $SKIP_REASON"
          fi

          # 确定重试次数和延迟 (优化加速策略)
          TEST_RETRY_COUNT=1
          BUILD_RETRY_COUNT=1
          TEST_RETRY_DELAY=30000
          BUILD_RETRY_DELAY=30000

          if [[ "$BUILD_TYPE" == "release" || "$BUILD_TYPE" == "release_candidate" ]]; then
            # Tag 触发或 Release 分支，优先保证成功，允许重试
            TEST_RETRY_COUNT=3
            BUILD_RETRY_COUNT=3
            TEST_RETRY_DELAY=60000
            BUILD_RETRY_DELAY=60000
            echo "🚀 检测到正式发布或验证流程，启用重试机制 (Count: 3)"
          else
            # 普通 PR 或 develop 推送，追求速度，不重试
            echo "⚡ 检测到普通开发流程，禁用重试以加速反馈"
          fi

          # 输出到GitHub Actions
          echo "should_run_tests=$SHOULD_RUN_TESTS" >> $GITHUB_OUTPUT
          echo "should_run_build=$SHOULD_RUN_BUILD" >> $GITHUB_OUTPUT
          echo "should_run_style=$SHOULD_RUN_STYLE" >> $GITHUB_OUTPUT
          echo "should_run_deploy=$SHOULD_RUN_DEPLOY" >> $GITHUB_OUTPUT
          echo "should_deploy_pages=${SHOULD_DEPLOY_PAGES:-false}" >> $GITHUB_OUTPUT
          echo "build_type=$BUILD_TYPE" >> $GITHUB_OUTPUT
          echo "pipeline_description=$PIPELINE_DESC" >> $GITHUB_OUTPUT
          echo "skip_reason=$SKIP_REASON" >> $GITHUB_OUTPUT
          echo "test_retry_count=$TEST_RETRY_COUNT" >> $GITHUB_OUTPUT
          echo "build_retry_count=$BUILD_RETRY_COUNT" >> $GITHUB_OUTPUT
          echo "test_retry_delay=$TEST_RETRY_DELAY" >> $GITHUB_OUTPUT
          echo "build_retry_delay=$BUILD_RETRY_DELAY" >> $GITHUB_OUTPUT

      - name: 📊 生成流程摘要
        run: |
          echo "## 🚀 CI/CD流水线执行预测" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**触发事件:** \`${{ github.event_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**执行描述:** ${{ steps.predict.outputs.pipeline_description }}" >> $GITHUB_STEP_SUMMARY
          echo "**构建类型:** \`${{ steps.predict.outputs.build_type }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # 添加当前配置信息
          echo "### ⚙️ 当前流水线配置" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**项目信息:**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 配置项 | 值 |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-----|" >> $GITHUB_STEP_SUMMARY
          jq -r '.project | "| 名称 | \(.name) |\n| Unity版本 | \(.unityVersion) |\n| 描述 | \(.description) |"' ".github/workflows/Pipeline Config/pipeline-settings.json" >> $GITHUB_STEP_SUMMARY
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**作业配置:**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 作业名称 | 描述 | 超时时间 | 失败处理 |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|------|----------|----------|" >> $GITHUB_STEP_SUMMARY
          jq -r '.jobs | to_entries[] | select(.key != "description") | "| \(.value.name) | \(.value.description) | \(.value.timeout)分钟 | \(.value.failureAction) |"' ".github/workflows/Pipeline Config/pipeline-settings.json" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "**支持的关键字:**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 关键字 | 描述 |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|------|" >> $GITHUB_STEP_SUMMARY
          jq -r '.triggers.skipKeywords.keywords[] | "| \(.keyword) | \(.description) |"' ".github/workflows/Pipeline Config/pipeline-settings.json" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### 📋 执行阶段预测" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 阶段 | 状态 | 说明 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|------|" >> $GITHUB_STEP_SUMMARY
          
          if [[ "${{ steps.predict.outputs.should_run_style }}" == "true" ]]; then
            echo "| 🎨 代码风格检查 | ✅ 执行 | 使用CSharpier检查代码格式 |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 🎨 代码风格检查 | ⏭️ 跳过 | - |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [[ "${{ steps.predict.outputs.should_run_tests }}" == "true" ]]; then
            echo "| 🧪 单元测试 | ✅ 执行 | 运行Unity EditMode和PlayMode测试 |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 🧪 单元测试 | ⏭️ 跳过 | - |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [[ "${{ steps.predict.outputs.should_run_build }}" == "true" ]]; then
            echo "| 🔨 构建测试 | ✅ 执行 | 构建Windows和macOS版本 |" >> $GITHUB_STEP_SUMMARY  
          else
            echo "| 🔨 构建测试 | ⏭️ 跳过 | - |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [[ "${{ steps.predict.outputs.should_run_deploy }}" == "true" ]]; then
            echo "| 🚀 Release发布 | ✅ 执行 | 发布构建产物到GitHub Release |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 🚀 Release发布 | ⏭️ 跳过 | - |" >> $GITHUB_STEP_SUMMARY
          fi

          if [[ "${{ steps.predict.outputs.should_deploy_pages }}" == "true" ]]; then
            echo "| 🌐 Pages部署 | ✅ 执行 | 部署WebGL到GitHub Pages |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 🌐 Pages部署 | ⏭️ 跳过 | - |" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [[ -n "${{ steps.predict.outputs.skip_reason }}" ]]; then
            echo "**跳过原因:** ${{ steps.predict.outputs.skip_reason }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

  # =============================================================================
  # 阶段1: 代码风格检查 - 使用CSharpier检查代码格式
  # =============================================================================
  code-style-check:
    name: 🎨 代码风格检查
    runs-on: ubuntu-latest
    needs: flow-prediction
    if: needs.flow-prediction.outputs.should_run_style == 'true'
    
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4
        with: 
          fetch-depth: 0 # 必须为 0 以进行 git diff

      - name: ⚙️ 安装 CSharpier
        run: |
          echo "⬇️ 安装 .NET Tool: CSharpier..."
          dotnet tool install -g csharpier

          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH
          csharpier --version

      - name: 📖 加载与解析配置
        id: config
        run: |
          echo "🔧 读取 Pipeline 配置..."
          CONFIG_FILE=".github/workflows/Pipeline Config/pipeline-settings.json"
          
          CHECK_PATHS=$(jq -r '.jobs.code_style.settings.checkPaths[]' "$CONFIG_FILE" | tr '\n' ' ')
          AUTO_FIX=$(jq -r '.jobs.code_style.settings.autoFix' "$CONFIG_FILE")
          
          if [ -z "$CHECK_PATHS" ]; then CHECK_PATHS="."; fi
          
          echo "📂 包含路径: $CHECK_PATHS"
          
          echo "check_paths=$CHECK_PATHS" >> $GITHUB_OUTPUT
          echo "auto_fix=$AUTO_FIX" >> $GITHUB_OUTPUT

      - name: 🧹 执行增量代码检查
        id: run_check
        env:
          CHECK_PATHS: ${{ steps.config.outputs.check_paths }}
        run: |
          echo "🎨 准备计算变更文件..."

          BASE_REF="origin/develop"
          if [[ "$GITHUB_EVENT_NAME" == "push" ]]; then
            BASE_REF="HEAD^"
          fi
                  
          echo "🔍 对比基准: $BASE_REF"
          echo "🔍 检索路径范围: $CHECK_PATHS"
                  
          # 读取变更文件（逐行，保留空格）
          mapfile -t FINAL_FILES_ARRAY < <(
            git diff --name-only --diff-filter=ACMR $BASE_REF HEAD -- $CHECK_PATHS | grep '\.cs$' || true
          )
                  
          if [ ${#FINAL_FILES_ARRAY[@]} -eq 0 ]; then
            echo "✅ 在指定路径下无 .cs 文件变更。"
            echo "status=skipped" >> $GITHUB_OUTPUT
            echo "files_count=0" >> $GITHUB_OUTPUT
            echo "failed_files=" >> $GITHUB_OUTPUT
            echo "checked_files_list=" >> $GITHUB_OUTPUT
            echo "csharpier_raw=" >> $GITHUB_OUTPUT
            exit 0
          fi
                  
          COUNT=${#FINAL_FILES_ARRAY[@]}
          echo "📝 即将检查 $COUNT 个文件..."
          echo "files_count=$COUNT" >> $GITHUB_OUTPUT
                  
          echo "📄 即将检查的文件列表:"
          printf '%s\n' "${FINAL_FILES_ARRAY[@]}"
                  
          # Base64 保存文件列表
          printf "%s\n" "${FINAL_FILES_ARRAY[@]}" | base64 -w 0 | \
            xargs -I {} echo "checked_files_list={}" >> $GITHUB_OUTPUT
                  
          echo "🚀 运行 CSharpier..."
          set +e
          CSHARPIER_OUTPUT=$(csharpier check "${FINAL_FILES_ARRAY[@]}" 2>&1)
          EXIT_CODE=$?
          set -e
                  
          echo "💼 保存CSharpier 输出..."
          echo "csharpier_raw=$(echo "$CSHARPIER_OUTPUT" | base64 -w 0)" >> $GITHUB_OUTPUT
                  
          # 解析失败的文件
          FAILED_FILES_RAW=$(echo "$CSHARPIER_OUTPUT" | grep -oE '^Error .*\.cs' | sed -E 's/^Error (.*\.cs).*/\1/')
                  
          FAILED_FILES_LIST=""
          if [ -n "$FAILED_FILES_RAW" ]; then
            while IFS= read -r line; do
              CLEAN_LINE=$(echo "$line" | xargs)
              [ -n "$CLEAN_LINE" ] && FAILED_FILES_LIST+="- $CLEAN_LINE"$'\n'
            done <<< "$FAILED_FILES_RAW"
          fi
                  
          if [ $EXIT_CODE -eq 0 ]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "failed_files=" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "failed_files=$(echo "$FAILED_FILES_LIST" | base64 -w 0)" >> $GITHUB_OUTPUT
            exit 1
          fi


      - name: 📊 生成检查报告
        if: always()
        run: |
          STATUS="${{ steps.run_check.outputs.status }}"
          COUNT="${{ steps.run_check.outputs.files_count }}"
          ENCODED_FAILED_FILES="${{ steps.run_check.outputs.failed_files }}"
          ENCODED_CHECKED_FILES="${{ steps.run_check.outputs.checked_files_list }}"
          ENCODED_RAW_OUTPUT="${{ steps.run_check.outputs.csharpier_raw }}"

          # --- 解码失败文件列表 ---
          if [ -n "$ENCODED_FAILED_FILES" ]; then
              FAILED_FILES=$(echo "$ENCODED_FAILED_FILES" | base64 -d)
          else
              FAILED_FILES=""
          fi

          # --- 解码所有接受检查的文件 ---
          if [ -n "$ENCODED_CHECKED_FILES" ]; then
              CHECKED_FILES=$(echo "$ENCODED_CHECKED_FILES" | base64 -d)
          else
              CHECKED_FILES=""
          fi

          # --- 解码 CSharpier 原始输出 ---
          if [ -n "$ENCODED_RAW_OUTPUT" ]; then
              RAW_OUTPUT=$(echo "$ENCODED_RAW_OUTPUT" | base64 -d)
          else
              RAW_OUTPUT="(无输出)"
          fi

          echo "## 🎨 代码风格检查报告" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # --- 状态显示 ---
          if [ "$STATUS" == "success" ]; then
            echo "✅ **结果:** 通过" >> $GITHUB_STEP_SUMMARY
            echo "🎉 所有变更的 C# 文件格式正确。" >> $GITHUB_STEP_SUMMARY

          elif [ "$STATUS" == "skipped" ]; then
            echo "⚪ **结果:** 跳过" >> $GITHUB_STEP_SUMMARY
            echo "✨ 指定路径内无 .cs 文件变更。" >> $GITHUB_STEP_SUMMARY

          else
            echo "❌ **结果:** 失败" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ 发现代码格式问题，请在本地运行 \`csharpier .\` 进行修复。" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            # --- 失败文件列表 ---
            if [ -n "$FAILED_FILES" ]; then
              FAILED_COUNT=$(echo "$FAILED_FILES" | wc -l)
              echo "### 📄 未通过格式检查的文件（${FAILED_COUNT} 个）" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY

              echo '```' >> $GITHUB_STEP_SUMMARY
              echo "$FAILED_FILES" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
            else
              echo "❓ **注意:** CSharpier 检查失败，但未能解析出具体文件列表。" >> $GITHUB_STEP_SUMMARY
            fi
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY

          # --- 所有检查文件 ---
          echo "### 📂 所有接受检查的文件（$COUNT 个）" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -n "$CHECKED_FILES" ]; then
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$CHECKED_FILES" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "_（无文件）_" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY

          # --- 配置详情 ---
          echo "### ⚙️ 配置详情" >> $GITHUB_STEP_SUMMARY
          echo "| 配置项 | 值 |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          echo "| **检查路径** | \`${{ steps.config.outputs.check_paths }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **检查文件数** | $COUNT |" >> $GITHUB_STEP_SUMMARY
          echo "| **自动修复** | ❌ (已禁用) |" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY

          # --- CSharpier 原始输出（已解码） ---
          echo "### 📄 CSharpier 原始输出" >> $GITHUB_STEP_SUMMARY
          echo "<details><summary>点击展开原始输出</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "$RAW_OUTPUT" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          echo "</details>" >> $GITHUB_STEP_SUMMARY

  # =============================================================================  
  # 阶段2: 单元测试 - 运行Unity项目中的单元测试
  # =============================================================================
  unity-tests:
    name: 🧪 Unity单元测试 (${{ matrix.testMode }})
    runs-on: ubuntu-latest
    needs: flow-prediction
    if: needs.flow-prediction.outputs.should_run_tests == 'true'
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        testMode: [EditMode, PlayMode]
        include:
          - testMode: EditMode
            license_account: primary
          - testMode: PlayMode
            license_account: backup
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          lfs: false
          submodules: recursive

      - name: 🔧 配置自定义 Git LFS
        env:
          LFS_USER: ${{ secrets.LFS_USERNAME }}
          LFS_PASS: ${{ secrets.LFS_PASSWORD }}
        run: |
          echo "🔧 设置 LFS URL (使用认证)..."
          git config lfs.url "http://${LFS_USER}:${LFS_PASS}@vanishxiao.top:3000/vanish/Rian_Rust_lfs.git/info/lfs"
          git lfs install
          git lfs pull

      - name: 📖 加载测试配置
        id: load-test-config  
        run: |
          echo "🔧 加载单元测试配置..."
          CONFIG_FILE=".github/workflows/Pipeline Config/pipeline-settings.json"
          UNITY_VERSION=$(jq -r '.project.unityVersion' "$CONFIG_FILE")
          echo "unity_version=$UNITY_VERSION" >> $GITHUB_OUTPUT

      - name: 💾 缓存Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-Tests-${{ matrix.testMode }}-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-Tests-${{ matrix.testMode }}-
            Library-

      - name: 🧪 运行 Unity 测试 [首选账号]
        uses: Wandalen/wretry.action@v3.8.0
        id: run-tests-first
        continue-on-error: true
        with:
          action: game-ci/unity-test-runner@v4
          attempt_limit: 1  # 首选账号只试1次，不行就立刻回退，节省时间
          with: |
            unityVersion: ${{ steps.load-test-config.outputs.unity_version }}
            testMode: ${{ matrix.testMode }}
            artifactsPath: artifacts/${{ matrix.testMode }}
        env:
          UNITY_EMAIL: ${{ matrix.license_account == 'backup' && secrets.UNITY_EMAIL_BACKUP || secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ matrix.license_account == 'backup' && secrets.UNITY_PASSWORD_BACKUP || secrets.UNITY_PASSWORD }}
          UNITY_LICENSE: ${{ matrix.license_account == 'backup' && secrets.UNITY_LICENSE_BACKUP || secrets.UNITY_LICENSE }}

      - name: 🔄 归还 首选 Unity License
        uses: game-ci/unity-return-license@v2
        if: always()
        continue-on-error: true
        env:
          UNITY_EMAIL: ${{ matrix.license_account == 'backup' && secrets.UNITY_EMAIL_BACKUP || secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ matrix.license_account == 'backup' && secrets.UNITY_PASSWORD_BACKUP || secrets.UNITY_PASSWORD }}
          UNITY_LICENSE: ${{ matrix.license_account == 'backup' && secrets.UNITY_LICENSE_BACKUP || secrets.UNITY_LICENSE }}

      - name: 🧪 运行 Unity 测试 [备用回退]
        uses: Wandalen/wretry.action@v3.8.0
        id: run-tests-fallback
        if: steps.run-tests-first.outcome == 'failure'
        with:
          action: game-ci/unity-test-runner@v4
          # 回退时，另一个账号可能正忙，所以即使是普通PR也要重试以排队（容灾模式）
          attempt_limit: 5
          attempt_delay: 30000
          with: |
            unityVersion: ${{ steps.load-test-config.outputs.unity_version }}
            testMode: ${{ matrix.testMode }}
            artifactsPath: artifacts/${{ matrix.testMode }}
        env:
          # 翻转账号逻辑：如果是 backup 则用 primary，反之亦然
          UNITY_EMAIL: ${{ matrix.license_account == 'backup' && secrets.UNITY_EMAIL || secrets.UNITY_EMAIL_BACKUP }}
          UNITY_PASSWORD: ${{ matrix.license_account == 'backup' && secrets.UNITY_PASSWORD || secrets.UNITY_PASSWORD_BACKUP }}
          UNITY_LICENSE: ${{ matrix.license_account == 'backup' && secrets.UNITY_LICENSE || secrets.UNITY_LICENSE_BACKUP }}

      - name: 🔄 归还 备用 Unity License
        uses: game-ci/unity-return-license@v2
        if: always()
        continue-on-error: true
        env:
          UNITY_EMAIL: ${{ matrix.license_account == 'backup' && secrets.UNITY_EMAIL || secrets.UNITY_EMAIL_BACKUP }}
          UNITY_PASSWORD: ${{ matrix.license_account == 'backup' && secrets.UNITY_PASSWORD || secrets.UNITY_PASSWORD_BACKUP }}
          UNITY_LICENSE: ${{ matrix.license_account == 'backup' && secrets.UNITY_LICENSE || secrets.UNITY_LICENSE_BACKUP }}

      - name: 📊 解析测试结果并生成摘要
        if: always()
        run: |
          # 1. 确定运行状态
          if [[ "${{ steps.run-tests-first.outcome }}" == "success" || "${{ steps.run-tests-fallback.outcome }}" == "success" ]]; then
            RUN_STATUS="✅ 运行成功"
            SUCCESS=true
          else
            RUN_STATUS="❌ 运行失败"
            SUCCESS=false
          fi

          # 2. 寻找结果文件 (全向搜索)
          SEARCH_DIR="artifacts/${{ matrix.testMode }}"
          FILE=$(find "$SEARCH_DIR" -type f -name "*.xml" | head -1)

          echo "## 🧪 Unity单元测试详情 - ${{ matrix.testMode }}" >> $GITHUB_STEP_SUMMARY
          echo "| 属性 | 信息 |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          echo "| 测试状态 | $RUN_STATUS |" >> $GITHUB_STEP_SUMMARY
          echo "| 测试模式 | \`${{ matrix.testMode }}\` |" >> $GITHUB_STEP_SUMMARY
          
          if [ -f "$FILE" ]; then
            # 使用更健壮的正则，并确保 grep 失败不中断脚本
            p=$(grep -oP 'passed="\d+"' "$FILE" | head -1 | grep -oP '\d+' || echo "0")
            f=$(grep -oP 'failed="\d+"' "$FILE" | head -1 | grep -oP '\d+' || echo "0")
            s=$(grep -oP 'skipped="\d+"' "$FILE" | head -1 | grep -oP '\d+' || echo "0")
            t=$(grep -oP 'total="\d+"' "$FILE" | head -1 | grep -oP '\d+' || echo "0")
            dur=$(grep -oP 'duration="\d+(\.\d+)?"' "$FILE" | head -1 | grep -oP '\d+(\.\d+)?' || echo "0")
            
            echo "| 使用账号 | ${{ matrix.license_account }} |" >> $GITHUB_STEP_SUMMARY
            echo "| 总耗时 | ${dur}s |" >> $GITHUB_STEP_SUMMARY
            echo "| 结果文件 | \`$(basename "$FILE")\` |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            
            echo "### 📈 统计数据" >> $GITHUB_STEP_SUMMARY
            echo "| 状态 | 数量 |" >> $GITHUB_STEP_SUMMARY
            echo "| :--- | :---: |" >> $GITHUB_STEP_SUMMARY
            echo "| ✅ 通过 | $p |" >> $GITHUB_STEP_SUMMARY
            echo "| ❌ 失败 | **$f** |" >> $GITHUB_STEP_SUMMARY
            echo "| ⏭️ 跳过 | $s |" >> $GITHUB_STEP_SUMMARY
            echo "| 📊 总计 | $t |" >> $GITHUB_STEP_SUMMARY

            # 如果有失败测试，列出前20个
            if [ "$f" -gt 0 ]; then
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "### 🚨 失败用例列表" >> $GITHUB_STEP_SUMMARY
              echo "| # | 测试用例名称 |" >> $GITHUB_STEP_SUMMARY
              echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
              
              # 提取失败的测试用例名
              grep -oP 'test-case[^>]*result="Failed"[^>]*name="\K[^"]+' "$FILE" > failed_list.txt || true
              
              i=1
              while read -r line; do
                echo "| $i | \`$line\` |" >> $GITHUB_STEP_SUMMARY
                ((i++))
                if [ $i -gt 20 ]; then break; fi
              done < failed_list.txt
              
              if [ "$(wc -l < failed_list.txt)" -gt 20 ]; then
                echo "| ... | 更多失败项请下载 Artifacts 查看 |" >> $GITHUB_STEP_SUMMARY
              fi
              # 确实有测试失败，标记 Job 失败
              exit 1
            fi
          else
            echo "| 错误 | ⚠️ 未找到结果文件 |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 🔍 调试信息" >> $GITHUB_STEP_SUMMARY
            echo "在目录 \`$SEARCH_DIR\` 下未发现 XML 结果。目录结构如下：" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            ls -R "$SEARCH_DIR" || echo "目录不存在" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            
            # 如果 Runner 报成功但没文件，通常是由于路径配置错误或 Unity 意外退出
            if [ "$SUCCESS" = true ]; then
              echo "❌ 虽然 Unity 返回成功，但未生成测试报告，请检查日志。"
              exit 1
            fi
          fi

      - name: 📊 上传测试结果
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unity-test-results-${{ matrix.testMode }}
          path: artifacts/

  # =============================================================================
  # 阶段3: 构建测试 - 构建Windows和macOS版本  
  # =============================================================================
  build-tests:
    name: 🔨 构建测试 (${{ matrix.profile }})
    needs: [flow-prediction]
    if: needs.flow-prediction.outputs.should_run_build == 'true'
    timeout-minutes: 60
    strategy:
      fail-fast: false
      max-parallel: 4  # 提高并发，总共 2 个 License，每个支持 2 台，共 4 台并发槽位
      matrix:
        include:
          - os: ubuntu-latest
            buildTarget: WebGL
            profile: Web-Release
            displayName: WebGL (Release)
            license_account: primary
          - os: ubuntu-latest
            buildTarget: StandaloneWindows64
            profile: Windows-Debug
            displayName: Windows (Debug)
            license_account: primary
          - os: ubuntu-latest
            buildTarget: StandaloneWindows64
            profile: Windows-Release
            displayName: Windows (Release)
            license_account: backup
          - os: macos-latest
            buildTarget: StandaloneOSX
            profile: Mac-Debug
            displayName: macOS (Debug)
            license_account: primary
          - os: macos-latest
            buildTarget: StandaloneOSX
            profile: Mac-Release
            displayName: macOS (Release)
            license_account: backup
    
    runs-on: ${{ matrix.os }}
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          lfs: false
          submodules: recursive

      - name: 🔧 配置自定义 Git LFS
        env:
          LFS_USER: ${{ secrets.LFS_USERNAME }}
          LFS_PASS: ${{ secrets.LFS_PASSWORD }}
        run: |
          echo "🔧 设置 LFS URL (使用认证)..."
          # 使用嵌入凭据的 URL 格式，Secrets 会被 GitHub 自动遮掩 (Masked)
          git config lfs.url "http://${LFS_USER}:${LFS_PASS}@vanishxiao.top:3000/vanish/Rian_Rust_lfs.git/info/lfs"
          git lfs install
          git lfs pull

      - name: 📖 加载构建配置
        id: load-build-config
        run: |
          echo "🔧 加载构建配置..."
          
          CONFIG_FILE=".github/workflows/Pipeline Config/pipeline-settings.json"
          
          UNITY_VERSION=$(jq -r '.project.unityVersion' "$CONFIG_FILE")
          PROJECT_NAME=$(jq -r '.project.name' "$CONFIG_FILE")
          BUILD_TYPE="${{ needs.flow-prediction.outputs.build_type }}"
          RETENTION_DAYS=$(jq -r '.jobs.build_tests.settings.retentionDays' "$CONFIG_FILE")
          RELEASE_VERSION="${{ needs.flow-prediction.outputs.release_version }}"
          
          echo "Unity版本: $UNITY_VERSION"
          echo "项目名称: $PROJECT_NAME"  
          echo "构建类型: $BUILD_TYPE"
          echo "发布版本: $RELEASE_VERSION"
          echo "保留天数: $RETENTION_DAYS"
          echo "构建目标: ${{ matrix.buildTarget }}"
          echo "显示名称: ${{ matrix.displayName }}"
          echo "Build Profile: ${{ matrix.profile }}"
          
          echo "unity_version=$UNITY_VERSION" >> $GITHUB_OUTPUT
          echo "project_name=$PROJECT_NAME" >> $GITHUB_OUTPUT
          echo "build_type=$BUILD_TYPE" >> $GITHUB_OUTPUT
          echo "retention_days=$RETENTION_DAYS" >> $GITHUB_OUTPUT
          echo "release_version=$RELEASE_VERSION" >> $GITHUB_OUTPUT

          # 确定重试次数和延迟
          RETRY_COUNT=3
          RETRY_DELAY=30000
          if [[ "$BUILD_TYPE" == "release" ]]; then
            RETRY_COUNT=10
            RETRY_DELAY=120000
            echo "🚀 检测到正式发布流程，增加构建重试次数至 $RETRY_COUNT，延迟至 $RETRY_DELAY ms"
          fi
          echo "retry_count=$RETRY_COUNT" >> $GITHUB_OUTPUT
          echo "retry_delay=$RETRY_DELAY" >> $GITHUB_OUTPUT

      - name: 💾 缓存Unity Library  
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ matrix.buildTarget }}-${{ matrix.profile }}-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-${{ matrix.buildTarget }}-${{ matrix.profile }}-
            Library-${{ matrix.buildTarget }}-
            Library-

      - name: 🔨 Unity构建 [首选账号]
        uses: Wandalen/wretry.action@v3.8.0
        id: run-build-first
        continue-on-error: true
        with:
          action: game-ci/unity-builder@v4
          attempt_limit: 1  # 首选账号只试1次，快进快出
          with: |
            unityVersion: ${{ steps.load-build-config.outputs.unity_version }}
            targetPlatform: ${{ matrix.buildTarget }}
            buildName: ${{ steps.load-build-config.outputs.project_name }}
            versioning: Tag
            customParameters: -buildProfile Assets/Settings/BuildProfiles/${{ matrix.profile }}.asset
        env:
          UNITY_EMAIL: ${{ matrix.license_account == 'backup' && secrets.UNITY_EMAIL_BACKUP || secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ matrix.license_account == 'backup' && secrets.UNITY_PASSWORD_BACKUP || secrets.UNITY_PASSWORD }}
          UNITY_LICENSE: ${{ matrix.license_account == 'backup' && secrets.UNITY_LICENSE_BACKUP || secrets.UNITY_LICENSE }}

      - name: 🔄 归还 首选 Unity License
        uses: game-ci/unity-return-license@v2
        if: always()
        continue-on-error: true
        env:
          UNITY_EMAIL: ${{ matrix.license_account == 'backup' && secrets.UNITY_EMAIL_BACKUP || secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ matrix.license_account == 'backup' && secrets.UNITY_PASSWORD_BACKUP || secrets.UNITY_PASSWORD }}
          UNITY_LICENSE: ${{ matrix.license_account == 'backup' && secrets.UNITY_LICENSE_BACKUP || secrets.UNITY_LICENSE }}

      - name: 🔨 Unity构建 [备用回退]
        uses: Wandalen/wretry.action@v3.8.0
        id: run-build-fallback
        if: steps.run-build-first.outcome == 'failure'
        with:
          action: game-ci/unity-builder@v4
          # 回退时进行排队
          attempt_limit: 5
          attempt_delay: 30000
          with: |
            unityVersion: ${{ steps.load-build-config.outputs.unity_version }}
            targetPlatform: ${{ matrix.buildTarget }}
            buildName: ${{ steps.load-build-config.outputs.project_name }}
            versioning: Tag
            customParameters: -buildProfile Assets/Settings/BuildProfiles/${{ matrix.profile }}.asset
        env:
          UNITY_EMAIL: ${{ matrix.license_account == 'backup' && secrets.UNITY_EMAIL || secrets.UNITY_EMAIL_BACKUP }}
          UNITY_PASSWORD: ${{ matrix.license_account == 'backup' && secrets.UNITY_PASSWORD || secrets.UNITY_PASSWORD_BACKUP }}
          UNITY_LICENSE: ${{ matrix.license_account == 'backup' && secrets.UNITY_LICENSE || secrets.UNITY_LICENSE_BACKUP }}

      - name: 🔄 归还 备用 Unity License
        uses: game-ci/unity-return-license@v2
        if: always()
        continue-on-error: true
        env:
          UNITY_EMAIL: ${{ matrix.license_account == 'backup' && secrets.UNITY_EMAIL || secrets.UNITY_EMAIL_BACKUP }}
          UNITY_PASSWORD: ${{ matrix.license_account == 'backup' && secrets.UNITY_PASSWORD || secrets.UNITY_PASSWORD_BACKUP }}
          UNITY_LICENSE: ${{ matrix.license_account == 'backup' && secrets.UNITY_LICENSE || secrets.UNITY_LICENSE_BACKUP }}
          
      - name: 📦 确定产物名称并上传
        id: determine-artifact-name
        if: steps.run-build-first.outcome == 'success' || steps.run-build-fallback.outcome == 'success'
        run: |
          VERSION_SUFFIX="v${{ github.run_number }}"
          if [[ -n "${{ steps.load-build-config.outputs.release_version }}" ]]; then
            VERSION_SUFFIX="v${{ steps.load-build-config.outputs.release_version }}"
          fi
          
          # 解析平台和配置
          # profile 格式通常为 Platform-Configuration (例如 Windows-Debug)
          PLATFORM=$(echo "${{ matrix.profile }}" | cut -d'-' -f1)
          CONFIG=$(echo "${{ matrix.profile }}" | cut -d'-' -f2)
          
          PROJECT_NAME="${{ steps.load-build-config.outputs.project_name }}"
          ARTIFACT_NAME="${PROJECT_NAME}-${PLATFORM}-${VERSION_SUFFIX}-${CONFIG}"
          
          echo "artifact_name=$ARTIFACT_NAME" >> $GITHUB_OUTPUT

      - name: 📦 上传构建产物
        uses: actions/upload-artifact@v4
        if: (steps.run-build-first.outcome == 'success' || steps.run-build-fallback.outcome == 'success') && needs.flow-prediction.outputs.build_type != 'preview'
        with:
          name: ${{ steps.determine-artifact-name.outputs.artifact_name }}
          path: build/
          retention-days: ${{ steps.load-build-config.outputs.retention_days }}

      - name: 📋 构建结果摘要
        if: always()
        run: |
          echo "## 🔨 构建测试结果 - ${{ matrix.displayName }}" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ steps.run-build-first.outcome }}" == "success" || "${{ steps.run-build-fallback.outcome }}" == "success" ]]; then
            echo "✅ **构建状态:** 成功" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **构建状态:** 失败" >> $GITHUB_STEP_SUMMARY
          fi
          echo "- 平台: \`${{ matrix.displayName }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- 目标: \`${{ matrix.buildTarget }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- 初始账号: \`${{ matrix.license_account }}\`" >> $GITHUB_STEP_SUMMARY



  # =============================================================================
  # 阶段4: 部署到GitHub Release - 将构建产物作为附件发布
  # =============================================================================
  deploy-release:
    name: 🚀 发布 GitHub Release
    runs-on: ubuntu-latest
    needs: [flow-prediction, build-tests]
    # 仅在 Tag 触发且预测需要部署时运行
    if: |
      always() &&
      github.event_name == 'push' && github.ref_type == 'tag' &&
      needs.flow-prediction.outputs.should_run_deploy == 'true' &&
      needs.build-tests.result == 'success'
    
    permissions:
      contents: write
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 📖 加载部署配置
        id: load-deploy-config
        run: |
          echo "🔧 加载部署配置..."
          CONFIG_FILE=".github/workflows/Pipeline Config/pipeline-settings.json"
          PROJECT_NAME=$(jq -r '.project.name' "$CONFIG_FILE")
          echo "project_name=$PROJECT_NAME" >> $GITHUB_OUTPUT

      - name: 📥 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          pattern: ${{ steps.load-deploy-config.outputs.project_name }}-*

      - name: 📦 准备发布附件 (Zip)
        id: prepare-assets
        run: |
          echo "📦 压缩构建产物..."
          mkdir -p ./release-assets
          cd ./artifacts
          for dir in */; do
            if [ -d "$dir" ]; then
              zip_name="${dir%/}.zip"
              echo "正在压缩 $dir -> $zip_name"
              zip -r "../release-assets/$zip_name" "$dir"
            fi
          done
          cd ..
          echo "✅ 附件准备完成"
          ls -lh ./release-assets

      - name: 🚀 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./release-assets/*.zip
          name: v${{ needs.flow-prediction.outputs.release_version }} Release
          tag_name: ${{ github.ref }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # =============================================================================
  # 阶段5: 部署到 GitHub Pages - WebGL 版本部署
  # =============================================================================
  deploy-pages:
    name: 🌐 部署到 GitHub Pages
    runs-on: ubuntu-latest
    needs: [flow-prediction, build-tests]
    if: |
      always() &&
      github.event_name == 'push' && github.ref_type == 'tag' &&
      needs.flow-prediction.outputs.should_deploy_pages == 'true' &&
      needs.build-tests.result == 'success'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    permissions:
      pages: write
      id-token: write

    steps:
      - name: 📥 下载 WebGL 构建产物
        uses: actions/download-artifact@v4
        with:
          pattern: "*-Web-*-Release"
          path: ./web-build
          merge-multiple: true

      - name: 🔍 查找 WebGL 输出目录
        id: find-webgl
        run: |
          echo "🔍 查找 index.html ..."
          WEBGL_INDEX=$(find ./web-build -name "index.html" -type f | head -1)
          if [ -z "$WEBGL_INDEX" ]; then
            echo "❌ 未找到 index.html，构建产物结构:"
            find ./web-build -type f | head -30
            exit 1
          fi
          WEBGL_DIR=$(dirname "$WEBGL_INDEX")
          echo "webgl_dir=$WEBGL_DIR" >> $GITHUB_OUTPUT
          echo "✅ WebGL 输出目录: $WEBGL_DIR"

      - name: ⚙️ 配置 GitHub Pages
        uses: actions/configure-pages@v5

      - name: 📦 上传 Pages 产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.find-webgl.outputs.webgl_dir }}

      - name: 🚀 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: 📊 Pages 部署摘要
        if: always()
        run: |
          echo "## 🌐 GitHub Pages 部署" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ steps.deployment.conclusion }}" == "success" ]]; then
            echo "✅ **部署成功**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "🔗 **访问地址:** ${{ steps.deployment.outputs.page_url }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **部署失败**，请检查日志。" >> $GITHUB_STEP_SUMMARY
          fi

  # =============================================================================
  # 阶段6: 执行详情汇总 - 汇总整个流水线的执行情况
  # =============================================================================
  execution-summary:
    name: 📊 执行详情汇总
    runs-on: ubuntu-latest
    needs: [flow-prediction, code-style-check, unity-tests, build-tests, deploy-release, deploy-pages]
    if: always()
    
    steps:
      - name: 📊 生成执行摘要
        run: |
          echo "📊 汇总CI/CD流水线执行结果..."
          
          # 收集各阶段状态
          FLOW_STATUS="${{ needs.flow-prediction.result }}"
          STYLE_STATUS="${{ needs.code-style-check.result }}"
          TEST_STATUS="${{ needs.unity-tests.result }}"
          BUILD_STATUS="${{ needs.build-tests.result }}"
          DEPLOY_STATUS="${{ needs.deploy-release.result }}"
          PAGES_STATUS="${{ needs.deploy-pages.result }}"

          echo "流程预测: $FLOW_STATUS"
          echo "代码检查: $STYLE_STATUS"
          echo "单元测试: $TEST_STATUS"
          echo "构建测试: $BUILD_STATUS"
          echo "Release发布: $DEPLOY_STATUS"
          echo "Pages部署: $PAGES_STATUS"
          
          # 生成详细的执行摘要
          echo "# 🚀 CI/CD流水线执行详情" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**流程描述:** ${{ needs.flow-prediction.outputs.pipeline_description }}" >> $GITHUB_STEP_SUMMARY
          echo "**构建类型:** \`${{ needs.flow-prediction.outputs.build_type }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**执行时间:** $(date)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "## 📋 执行阶段详情" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 阶段 | 状态 | 结果 | 说明 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|------|------|" >> $GITHUB_STEP_SUMMARY
          
          # 流程预测
          if [[ "$FLOW_STATUS" == "success" ]]; then
            echo "| 📋 流程预测 | ✅ 成功 | 已完成 | 成功分析触发条件和预测执行流程 |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 📋 流程预测 | ❌ 失败 | 已完成 | 流程预测失败 |" >> $GITHUB_STEP_SUMMARY
          fi
          
          # 代码检查
          if [[ "${{ needs.flow-prediction.outputs.should_run_style }}" == "true" ]]; then
            if [[ "$STYLE_STATUS" == "success" ]]; then
              echo "| 🎨 代码检查 | ✅ 成功 | 已完成 | 代码格式检查通过 |" >> $GITHUB_STEP_SUMMARY
            elif [[ "$STYLE_STATUS" == "failure" ]]; then
              echo "| 🎨 代码检查 | ❌ 失败 | 已完成 | 代码格式检查未通过 |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| 🎨 代码检查 | ⚠️ 异常 | 已完成 | 状态: $STYLE_STATUS |" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "| 🎨 代码检查 | ⏭️ 跳过 | - | 根据触发条件跳过 |" >> $GITHUB_STEP_SUMMARY
          fi
          
          # 单元测试
          if [[ "${{ needs.flow-prediction.outputs.should_run_tests }}" == "true" ]]; then
            if [[ "$TEST_STATUS" == "success" ]]; then
              echo "| 🧪 单元测试 | ✅ 成功 | 已完成 | Unity测试全部通过 |" >> $GITHUB_STEP_SUMMARY
            elif [[ "$TEST_STATUS" == "failure" ]]; then
              echo "| 🧪 单元测试 | ❌ 失败 | 已完成 | 存在测试失败 |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| 🧪 单元测试 | ⚠️ 异常 | 已完成 | 状态: $TEST_STATUS |" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "| 🧪 单元测试 | ⏭️ 跳过 | - | 根据触发条件跳过 |" >> $GITHUB_STEP_SUMMARY
          fi
          
          # 构建测试
          if [[ "${{ needs.flow-prediction.outputs.should_run_build }}" == "true" ]]; then
            if [[ "$BUILD_STATUS" == "success" ]]; then
              echo "| 🔨 构建测试 | ✅ 成功 | 已完成 | 5个Profile版本构建成功 |" >> $GITHUB_STEP_SUMMARY
            elif [[ "$BUILD_STATUS" == "failure" ]]; then
              echo "| 🔨 构建测试 | ⚠️ 警告 | 已完成 | 构建失败但不影响流程 |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| 🔨 构建测试 | ⚠️ 异常 | 已完成 | 状态: $BUILD_STATUS |" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "| 🔨 构建测试 | ⏭️ 跳过 | - | 根据触发条件跳过 |" >> $GITHUB_STEP_SUMMARY
          fi

          # Release发布
          if [[ "${{ needs.flow-prediction.outputs.should_run_deploy }}" == "true" ]]; then
            if [[ "$DEPLOY_STATUS" == "success" ]]; then
              echo "| 🚀 Release发布 | ✅ 成功 | 已完成 | 构建产物已发布到 GitHub Release |" >> $GITHUB_STEP_SUMMARY
            elif [[ "$DEPLOY_STATUS" == "failure" ]]; then
              echo "| 🚀 Release发布 | ⚠️ 警告 | 已完成 | 发布失败但不影响流程 |" >> $GITHUB_STEP_SUMMARY
            elif [[ "$DEPLOY_STATUS" == "skipped" ]]; then
              echo "| 🚀 Release发布 | ⏭️ 跳过 | - | 非release tag或跳过部署 |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| 🚀 Release发布 | ⚠️ 异常 | 已完成 | 状态: $DEPLOY_STATUS |" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "| 🚀 Release发布 | ⏭️ 跳过 | - | 根据触发条件跳过 |" >> $GITHUB_STEP_SUMMARY
          fi

          # Pages部署
          if [[ "${{ needs.flow-prediction.outputs.should_deploy_pages }}" == "true" ]]; then
            if [[ "$PAGES_STATUS" == "success" ]]; then
              echo "| 🌐 Pages部署 | ✅ 成功 | 已完成 | WebGL已部署到 GitHub Pages |" >> $GITHUB_STEP_SUMMARY
            elif [[ "$PAGES_STATUS" == "failure" ]]; then
              echo "| 🌐 Pages部署 | ⚠️ 警告 | 已完成 | Pages部署失败 |" >> $GITHUB_STEP_SUMMARY
            elif [[ "$PAGES_STATUS" == "skipped" ]]; then
              echo "| 🌐 Pages部署 | ⏭️ 跳过 | - | 构建失败或条件不满足 |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| 🌐 Pages部署 | ⚠️ 异常 | 已完成 | 状态: $PAGES_STATUS |" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "| 🌐 Pages部署 | ⏭️ 跳过 | - | 非 vx.y.z-release tag |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY

          # 总体状态判断
          if [[ "$FLOW_STATUS" == "success" &&
                ("$STYLE_STATUS" == "success" || "$STYLE_STATUS" == "skipped") &&
                ("$TEST_STATUS" == "success" || "$TEST_STATUS" == "skipped") ]]; then
            echo "## ✅ 流水线执行成功" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "🎉 所有必需的步骤都已成功完成！" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ 流水线执行失败" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ 部分步骤执行失败，请检查上述详情。" >> $GITHUB_STEP_SUMMARY
          fi

          if [[ -n "${{ needs.flow-prediction.outputs.skip_reason }}" ]]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**跳过信息:** ${{ needs.flow-prediction.outputs.skip_reason }}" >> $GITHUB_STEP_SUMMARY
          fi

          # 判断最终状态
          FAILED=0
          # Flow 必须成功
          if [[ "$FLOW_STATUS" != "success" ]]; then
            FAILED=1
          fi

          # 以下只要执行且失败就算失败（skipped 不算）
          for STATUS in "$STYLE_STATUS" "$TEST_STATUS" "$BUILD_STATUS" "$DEPLOY_STATUS" "$PAGES_STATUS"
          do
            if [[ "$STATUS" == "failure" ]]; then
              FAILED=1
            fi
          done

          if [[ $FAILED -eq 1 ]]; then
            echo "❌ 流水线失败"
            exit 1
          else
            echo "🎉 流水线成功"
            exit 0
          fi