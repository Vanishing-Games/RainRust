name: 🚀 主CI/CD流水线

on:
  # Pull Request 触发 - develop和main分支
  pull_request:
    branches: [develop, main]
    types: [opened, synchronize, reopened, ready_for_review]

  # Push 触发 - 仅release分支和develop分支的直接推送
  # 注意：当创建PR时，不会触发目标分支的push事件，只会触发pull_request事件
  # 排除PR分支的推送，避免与pull_request事件重复
  push:
    branches: 
      - develop
      - 'release/**'
    # 排除.github目录的更改，避免工作流更新时的无意义触发
    paths-ignore:
      - '.github/workflows/**'
      - '.github/config/**'
      - '**.md'

  # 定时触发 - 北京时间每周日晚上7点 (UTC 11:00)
  schedule:
    - cron: '0 11 * * 0'

  # 手动触发
  workflow_dispatch:
    inputs:
      skip_tests:
        description: '跳过单元测试'
        required: false
        default: false
        type: boolean
      skip_build:
        description: '跳过构建测试'  
        required: false
        default: false
        type: boolean
      skip_style:
        description: '跳过代码风格检查'
        required: false
        default: false
        type: boolean

# 权限配置
permissions:
  contents: read
  actions: read
  pages: write
  id-token: write

jobs:
  # =============================================================================
  # 阶段0: 流程预测 - 分析配置并预测将执行的步骤
  # =============================================================================
  flow-prediction:
    name: 📋 流程预测
    runs-on: ubuntu-latest
    outputs:
      should_run_tests: ${{ steps.predict.outputs.should_run_tests }}
      should_run_build: ${{ steps.predict.outputs.should_run_build }}  
      should_run_style: ${{ steps.predict.outputs.should_run_style }}
      should_run_deploy: ${{ steps.predict.outputs.should_run_deploy }}
      build_type: ${{ steps.predict.outputs.build_type }}
      pipeline_description: ${{ steps.predict.outputs.pipeline_description }}
      skip_reason: ${{ steps.predict.outputs.skip_reason }}
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 📖 加载流水线配置
        id: load-config
        run: |
          echo "🔧 加载流水线配置文件..."
          
          # 检查配置文件是否存在
          if [[ ! -f ".github/workflows/Pipeline Config/pipeline-settings.json" ]]; then
            echo "❌ 错误: 流水线配置文件不存在"
            exit 1
          fi
          
          # 验证JSON格式
          if ! jq empty ".github/workflows/Pipeline Config/pipeline-settings.json" 2>/dev/null; then
            echo "❌ 错误: 流水线配置文件JSON格式无效"
            exit 1
          fi
          
          echo "✅ 配置文件加载成功"
          
          # 输出详细配置摘要
          echo "📋 项目信息:"
          jq -r '.project | "  名称: \(.name)\n  版本: \(.unityVersion)\n  描述: \(.description)"' ".github/workflows/Pipeline Config/pipeline-settings.json"
          
          echo ""
          echo "🔧 流水线作业配置:"
          jq -r '.jobs | to_entries[] | select(.key != "description") | "  \(.value.name): \(.value.description) (超时: \(.value.timeout)分钟, 失败处理: \(.value.failureAction))"' ".github/workflows/Pipeline Config/pipeline-settings.json"
          
          echo ""
          echo "🎛️ 支持的PR关键字:"
          jq -r '.triggers.skipKeywords.keywords[] | "  \(.keyword): \(.description)"' ".github/workflows/Pipeline Config/pipeline-settings.json"
          
          echo ""
          echo "🔑 必需的Secrets:"
          jq -r '.requirements.secrets.required[] | "  \(.name): \(.description)"' ".github/workflows/Pipeline Config/pipeline-settings.json"

      - name: 🎯 分析触发条件和预测流程
        id: predict
        run: |
          echo "🔍 分析当前触发条件..."
          
          # 获取事件类型和相关信息
          EVENT_NAME="${{ github.event_name }}"
          REF_NAME="${{ github.ref_name }}" 
          BRANCH_NAME="${{ github.head_ref || github.ref_name }}"
          
          # 检查是否为重复触发（同时有PR和push事件）
          if [[ "$EVENT_NAME" == "push" && "$REF_NAME" == "develop" ]]; then
            # 检查当前commit是否有关联的开放PR
            echo "🔍 检查是否存在重复的PR触发..."
            # 如果是push到develop且可能有PR打开，我们优先让PR事件处理
            echo "⚠️ 这是develop分支的push事件，可能与PR事件重复"
            echo "💡 建议：如果有活跃的PR，优先使用PR事件的工作流"
          fi
          
          # 检查PR标题或最新commit消息中的控制关键字
          SKIP_ALL=false
          SKIP_TESTS=false
          SKIP_BUILD=false
          SKIP_FORMAT=false
          ADD_TESTS=false
          ADD_BUILD=false
          ADD_DEPLOY=false
          SKIP_REASON=""
          
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            PR_TITLE="${{ github.event.pull_request.title }}"
            COMMIT_MSG="${{ github.event.pull_request.title }}"
            echo "📝 PR标题: $PR_TITLE"
          else
            COMMIT_MSG="${{ github.event.head_commit.message }}"
            echo "📝 Commit消息: $COMMIT_MSG"
          fi
          
          # 检查跳过关键字
          if [[ "$COMMIT_MSG" =~ \[SKIP\ CICD\] ]]; then
            SKIP_ALL=true
            SKIP_REASON="PR标题/commit消息包含 [SKIP CICD]"
          elif [[ "$COMMIT_MSG" =~ \[SKIP\ FORMAT\] ]]; then
            SKIP_FORMAT=true
            SKIP_REASON="PR标题/commit消息包含 [SKIP FORMAT]"
          elif [[ "$COMMIT_MSG" =~ \[SKIP\ TEST\] ]]; then
            SKIP_TESTS=true
            SKIP_REASON="PR标题/commit消息包含 [SKIP TEST]"  
          elif [[ "$COMMIT_MSG" =~ \[SKIP\ BUILD\] ]]; then
            SKIP_BUILD=true
            SKIP_REASON="PR标题/commit消息包含 [SKIP BUILD]"
          fi
          
          # 检查增加关键字
          if [[ "$COMMIT_MSG" =~ \[ADD\ TEST\] ]]; then
            ADD_TESTS=true
            echo "🔍 检测到 [ADD TEST] 关键字"
          fi
          if [[ "$COMMIT_MSG" =~ \[ADD\ BUILD\] ]]; then
            ADD_BUILD=true
            echo "🔍 检测到 [ADD BUILD] 关键字"
          fi
          if [[ "$COMMIT_MSG" =~ \[ADD\ DEPLOY\] ]]; then
            ADD_DEPLOY=true
            echo "🔍 检测到 [ADD DEPLOY] 关键字"
          fi
          
          # 检查手动输入参数
          if [[ "${{ github.event.inputs.skip_tests }}" == "true" ]]; then
            SKIP_TESTS=true
            SKIP_REASON="手动选择跳过测试"
          fi
          if [[ "${{ github.event.inputs.skip_build }}" == "true" ]]; then
            SKIP_BUILD=true  
            SKIP_REASON="手动选择跳过构建"
          fi
          if [[ "${{ github.event.inputs.skip_style }}" == "true" ]]; then
            SKIP_STYLE=true
            SKIP_REASON="手动选择跳过代码检查"
          fi
          
          echo "🎯 触发条件分析:"
          echo "  事件类型: $EVENT_NAME"
          echo "  分支名称: $BRANCH_NAME"
          echo "  引用名称: $REF_NAME"
          
          # 根据分支和事件类型决定执行的步骤
          SHOULD_RUN_TESTS=true
          SHOULD_RUN_BUILD=false
          SHOULD_RUN_STYLE=true  
          SHOULD_RUN_DEPLOY=false
          BUILD_TYPE="preview"
          PIPELINE_DESC=""
          
          if [[ "$SKIP_ALL" == "true" ]]; then
            # 完全跳过
            SHOULD_RUN_TESTS=false
            SHOULD_RUN_BUILD=false
            SHOULD_RUN_STYLE=false
            SHOULD_RUN_DEPLOY=false
            PIPELINE_DESC="❌ 跳过所有CI/CD流程"
            
          elif [[ "$BRANCH_NAME" =~ ^release/ ]]; then
            # Release分支 - 完整CI/CD流程
            SHOULD_RUN_TESTS=true
            SHOULD_RUN_BUILD=true
            SHOULD_RUN_STYLE=true
            SHOULD_RUN_DEPLOY=true
            BUILD_TYPE="release"
            PIPELINE_DESC="🚀 Release完整流程 (代码检测 → 单元测试 → 构建测试 → 部署Pages)"
            
          elif [[ "$BRANCH_NAME" == "develop" && "$EVENT_NAME" == "pull_request" ]]; then
            # Develop分支PR - CI验证流程
            echo "🔍 检测到 develop 分支 PR，应用默认配置"
            SHOULD_RUN_TESTS=true
            SHOULD_RUN_BUILD=false
            SHOULD_RUN_STYLE=true
            BUILD_TYPE="preview"
            PIPELINE_DESC="📝 Develop PR验证流程 (代码检测 → 单元测试)"
            
          elif [[ "$BRANCH_NAME" == "main" && "$EVENT_NAME" == "pull_request" ]]; then
            # Main分支PR - 完整CI流程  
            SHOULD_RUN_TESTS=true
            SHOULD_RUN_BUILD=true
            SHOULD_RUN_STYLE=true
            BUILD_TYPE="release_candidate"
            PIPELINE_DESC="🔨 Main PR验证流程 (代码检测 → 单元测试 → 构建测试)"
            
          elif [[ "$BRANCH_NAME" == "develop" && "$EVENT_NAME" == "push" ]]; then
            # Develop分支推送 - CI流程
            SHOULD_RUN_TESTS=true
            SHOULD_RUN_BUILD=false  
            SHOULD_RUN_STYLE=true
            BUILD_TYPE="preview"
            PIPELINE_DESC="🔄 Develop分支状态验证 (代码检测 → 单元测试)"
            
          elif [[ "$EVENT_NAME" == "schedule" ]]; then
            # 定时构建 - 仅构建测试
            SHOULD_RUN_TESTS=false
            SHOULD_RUN_BUILD=true
            SHOULD_RUN_STYLE=false
            BUILD_TYPE="preview"  
            PIPELINE_DESC="⏰ 定时构建流程 (构建测试)"
            
          else
            # 其他情况 - 基础CI
            SHOULD_RUN_TESTS=true
            SHOULD_RUN_BUILD=false
            SHOULD_RUN_STYLE=true
            BUILD_TYPE="preview"
            PIPELINE_DESC="🧪 基础CI流程 (代码检测 → 单元测试)"
          fi
          
          # 应用跳过设置
          if [[ "$SKIP_TESTS" == "true" ]]; then
            SHOULD_RUN_TESTS=false
          fi
          if [[ "$SKIP_BUILD" == "true" ]]; then
            SHOULD_RUN_BUILD=false
            SHOULD_RUN_DEPLOY=false
          fi
          if [[ "$SKIP_FORMAT" == "true" ]]; then
            SHOULD_RUN_STYLE=false
          fi
          if [[ "$SKIP_STYLE" == "true" ]]; then
            SHOULD_RUN_STYLE=false
          fi
          
          # 应用增加设置
          ADD_REASONS=""
          if [[ "$ADD_TESTS" == "true" ]]; then
            SHOULD_RUN_TESTS=true
            echo "✅ 应用 [ADD TEST]：启用单元测试"
            ADD_REASONS="${ADD_REASONS}[ADD TEST] "
          fi
          if [[ "$ADD_BUILD" == "true" ]]; then
            SHOULD_RUN_BUILD=true
            echo "✅ 应用 [ADD BUILD]：启用构建测试"
            ADD_REASONS="${ADD_REASONS}[ADD BUILD] "
          fi
          if [[ "$ADD_DEPLOY" == "true" ]]; then
            SHOULD_RUN_DEPLOY=true
            echo "✅ 应用 [ADD DEPLOY]：启用部署"
            ADD_REASONS="${ADD_REASONS}[ADD DEPLOY] "
            # 如果要部署但没有构建，自动启用构建
            if [[ "$SHOULD_RUN_BUILD" == "false" ]]; then
              SHOULD_RUN_BUILD=true
              echo "✅ 自动启用构建（部署需要构建产物）"
            fi
          fi
          
          # 更新跳过/增加原因
          if [[ -n "$ADD_REASONS" ]]; then
            if [[ -z "$SKIP_REASON" ]]; then
              SKIP_REASON="PR标题包含增强关键字: $ADD_REASONS"
            else
              SKIP_REASON="${SKIP_REASON}; 同时包含增强关键字: $ADD_REASONS"
            fi
          fi
          
          echo ""
          echo "🔧 关键字状态:"
          echo "  ADD_TESTS: $ADD_TESTS"
          echo "  ADD_BUILD: $ADD_BUILD"
          echo "  ADD_DEPLOY: $ADD_DEPLOY"
          echo "  SKIP_TESTS: $SKIP_TESTS"
          echo "  SKIP_BUILD: $SKIP_BUILD"
          echo "  SKIP_FORMAT: $SKIP_FORMAT"
          echo ""
          echo "📋 流程预测结果:"
          echo "  构建类型: $BUILD_TYPE"
          echo "  执行描述: $PIPELINE_DESC"
          echo "  单元测试: $SHOULD_RUN_TESTS"
          echo "  构建测试: $SHOULD_RUN_BUILD"  
          echo "  代码检查: $SHOULD_RUN_STYLE"
          echo "  Pages部署: $SHOULD_RUN_DEPLOY"
          
          if [[ -n "$SKIP_REASON" ]]; then
            echo "  跳过原因: $SKIP_REASON"
          fi
          
          # 输出到GitHub Actions
          echo "should_run_tests=$SHOULD_RUN_TESTS" >> $GITHUB_OUTPUT
          echo "should_run_build=$SHOULD_RUN_BUILD" >> $GITHUB_OUTPUT
          echo "should_run_style=$SHOULD_RUN_STYLE" >> $GITHUB_OUTPUT  
          echo "should_run_deploy=$SHOULD_RUN_DEPLOY" >> $GITHUB_OUTPUT
          echo "build_type=$BUILD_TYPE" >> $GITHUB_OUTPUT
          echo "pipeline_description=$PIPELINE_DESC" >> $GITHUB_OUTPUT
          echo "skip_reason=$SKIP_REASON" >> $GITHUB_OUTPUT

      - name: 📊 生成流程摘要
        run: |
          echo "## 🚀 CI/CD流水线执行预测" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**触发事件:** \`${{ github.event_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**执行描述:** ${{ steps.predict.outputs.pipeline_description }}" >> $GITHUB_STEP_SUMMARY
          echo "**构建类型:** \`${{ steps.predict.outputs.build_type }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # 添加当前配置信息
          echo "### ⚙️ 当前流水线配置" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**项目信息:**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 配置项 | 值 |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-----|" >> $GITHUB_STEP_SUMMARY
          jq -r '.project | "| 名称 | \(.name) |\n| Unity版本 | \(.unityVersion) |\n| 描述 | \(.description) |"' ".github/workflows/Pipeline Config/pipeline-settings.json" >> $GITHUB_STEP_SUMMARY
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**作业配置:**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 作业名称 | 描述 | 超时时间 | 失败处理 |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|------|----------|----------|" >> $GITHUB_STEP_SUMMARY
          jq -r '.jobs | to_entries[] | select(.key != "description") | "| \(.value.name) | \(.value.description) | \(.value.timeout)分钟 | \(.value.failureAction) |"' ".github/workflows/Pipeline Config/pipeline-settings.json" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "**支持的关键字:**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 关键字 | 描述 |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|------|" >> $GITHUB_STEP_SUMMARY
          jq -r '.triggers.skipKeywords.keywords[] | "| \(.keyword) | \(.description) |"' ".github/workflows/Pipeline Config/pipeline-settings.json" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### 📋 执行阶段预测" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 阶段 | 状态 | 说明 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|------|" >> $GITHUB_STEP_SUMMARY
          
          if [[ "${{ steps.predict.outputs.should_run_style }}" == "true" ]]; then
            echo "| 🎨 代码风格检查 | ✅ 执行 | 使用CSharpier检查代码格式 |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 🎨 代码风格检查 | ⏭️ 跳过 | - |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [[ "${{ steps.predict.outputs.should_run_tests }}" == "true" ]]; then
            echo "| 🧪 单元测试 | ✅ 执行 | 运行Unity EditMode和PlayMode测试 |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 🧪 单元测试 | ⏭️ 跳过 | - |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [[ "${{ steps.predict.outputs.should_run_build }}" == "true" ]]; then
            echo "| 🔨 构建测试 | ✅ 执行 | 构建Windows和macOS版本 |" >> $GITHUB_STEP_SUMMARY  
          else
            echo "| 🔨 构建测试 | ⏭️ 跳过 | - |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [[ "${{ steps.predict.outputs.should_run_deploy }}" == "true" ]]; then
            echo "| 🚀 Pages部署 | ✅ 执行 | 部署构建产物到GitHub Pages |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 🚀 Pages部署 | ⏭️ 跳过 | - |" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [[ -n "${{ steps.predict.outputs.skip_reason }}" ]]; then
            echo "**跳过原因:** ${{ steps.predict.outputs.skip_reason }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

  # =============================================================================
  # 阶段1: 代码风格检查 - 使用CSharpier检查代码格式
  # =============================================================================
  code-style-check:
    name: 🎨 代码风格检查
    runs-on: ubuntu-latest
    needs: flow-prediction
    if: needs.flow-prediction.outputs.should_run_style == 'true'
    
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4
        with: 
          fetch-depth: 0 # 必须为 0 以进行 git diff

      - name: ⚙️ 安装 CSharpier
        run: |
          echo "⬇️ 安装 .NET Tool: CSharpier..."
          dotnet tool install -g csharpier

          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH
          csharpier --version

      - name: 📖 加载与解析配置
        id: config
        run: |
          echo "🔧 读取 Pipeline 配置..."
          CONFIG_FILE=".github/workflows/Pipeline Config/pipeline-settings.json"
          
          CHECK_PATHS=$(jq -r '.jobs.code_style.settings.checkPaths[]' "$CONFIG_FILE" | tr '\n' ' ')
          AUTO_FIX=$(jq -r '.jobs.code_style.settings.autoFix' "$CONFIG_FILE")
          
          if [ -z "$CHECK_PATHS" ]; then CHECK_PATHS="."; fi
          
          echo "📂 包含路径: $CHECK_PATHS"
          
          echo "check_paths=$CHECK_PATHS" >> $GITHUB_OUTPUT
          echo "auto_fix=$AUTO_FIX" >> $GITHUB_OUTPUT

      - name: 🧹 执行增量代码检查
        id: run_check
        env:
          CHECK_PATHS: ${{ steps.config.outputs.check_paths }}
        run: |
          echo "🎨 准备计算变更文件..."

          BASE_REF="origin/develop"
          if [[ "$GITHUB_EVENT_NAME" == "push" ]]; then
            BASE_REF="HEAD^"
          fi
                  
          echo "🔍 对比基准: $BASE_REF"
          echo "🔍 检索路径范围: $CHECK_PATHS"
                  
          # 读取变更文件（逐行，保留空格）
          mapfile -t FINAL_FILES_ARRAY < <(
            git diff --name-only --diff-filter=ACMR $BASE_REF HEAD -- $CHECK_PATHS | grep '\.cs$' || true
          )
                  
          if [ ${#FINAL_FILES_ARRAY[@]} -eq 0 ]; then
            echo "✅ 在指定路径下无 .cs 文件变更。"
            echo "status=skipped" >> $GITHUB_OUTPUT
            echo "files_count=0" >> $GITHUB_OUTPUT
            echo "failed_files=" >> $GITHUB_OUTPUT
            echo "checked_files_list=" >> $GITHUB_OUTPUT
            echo "csharpier_raw=" >> $GITHUB_OUTPUT
            exit 0
          fi
                  
          COUNT=${#FINAL_FILES_ARRAY[@]}
          echo "📝 即将检查 $COUNT 个文件..."
          echo "files_count=$COUNT" >> $GITHUB_OUTPUT
                  
          echo "📄 即将检查的文件列表:"
          printf '%s\n' "${FINAL_FILES_ARRAY[@]}"
                  
          # Base64 保存文件列表
          printf "%s\n" "${FINAL_FILES_ARRAY[@]}" | base64 -w 0 | \
            xargs -I {} echo "checked_files_list={}" >> $GITHUB_OUTPUT
                  
          echo "🚀 运行 CSharpier..."
          set +e
          CSHARPIER_OUTPUT=$(csharpier check "${FINAL_FILES_ARRAY[@]}" 2>&1)
          EXIT_CODE=$?
          set -e
                  
          echo "💼 保存CSharpier 输出..."
          echo "csharpier_raw=$(echo "$CSHARPIER_OUTPUT" | base64 -w 0)" >> $GITHUB_OUTPUT
                  
          # 解析失败的文件
          FAILED_FILES_RAW=$(echo "$CSHARPIER_OUTPUT" | grep -oE '^Error .*\.cs' | sed -E 's/^Error (.*\.cs).*/\1/')
                  
          FAILED_FILES_LIST=""
          if [ -n "$FAILED_FILES_RAW" ]; then
            while IFS= read -r line; do
              CLEAN_LINE=$(echo "$line" | xargs)
              [ -n "$CLEAN_LINE" ] && FAILED_FILES_LIST+="- $CLEAN_LINE"$'\n'
            done <<< "$FAILED_FILES_RAW"
          fi
                  
          if [ $EXIT_CODE -eq 0 ]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "failed_files=" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "failed_files=$(echo "$FAILED_FILES_LIST" | base64 -w 0)" >> $GITHUB_OUTPUT
            exit 1
          fi


      - name: 📊 生成检查报告
        if: always()
        run: |
          STATUS="${{ steps.run_check.outputs.status }}"
          COUNT="${{ steps.run_check.outputs.files_count }}"
          ENCODED_FAILED_FILES="${{ steps.run_check.outputs.failed_files }}"
          ENCODED_CHECKED_FILES="${{ steps.run_check.outputs.checked_files_list }}"
          ENCODED_RAW_OUTPUT="${{ steps.run_check.outputs.csharpier_raw }}"

          # --- 解码失败文件列表 ---
          if [ -n "$ENCODED_FAILED_FILES" ]; then
              FAILED_FILES=$(echo "$ENCODED_FAILED_FILES" | base64 -d)
          else
              FAILED_FILES=""
          fi

          # --- 解码所有接受检查的文件 ---
          if [ -n "$ENCODED_CHECKED_FILES" ]; then
              CHECKED_FILES=$(echo "$ENCODED_CHECKED_FILES" | base64 -d)
          else
              CHECKED_FILES=""
          fi

          # --- 解码 CSharpier 原始输出 ---
          if [ -n "$ENCODED_RAW_OUTPUT" ]; then
              RAW_OUTPUT=$(echo "$ENCODED_RAW_OUTPUT" | base64 -d)
          else
              RAW_OUTPUT="(无输出)"
          fi

          echo "## 🎨 代码风格检查报告" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # --- 状态显示 ---
          if [ "$STATUS" == "success" ]; then
            echo "✅ **结果:** 通过" >> $GITHUB_STEP_SUMMARY
            echo "🎉 所有变更的 C# 文件格式正确。" >> $GITHUB_STEP_SUMMARY

          elif [ "$STATUS" == "skipped" ]; then
            echo "⚪ **结果:** 跳过" >> $GITHUB_STEP_SUMMARY
            echo "✨ 指定路径内无 .cs 文件变更。" >> $GITHUB_STEP_SUMMARY

          else
            echo "❌ **结果:** 失败" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ 发现代码格式问题，请在本地运行 \`csharpier .\` 进行修复。" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            # --- 失败文件列表 ---
            if [ -n "$FAILED_FILES" ]; then
              FAILED_COUNT=$(echo "$FAILED_FILES" | wc -l)
              echo "### 📄 未通过格式检查的文件（${FAILED_COUNT} 个）" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY

              echo '```' >> $GITHUB_STEP_SUMMARY
              echo "$FAILED_FILES" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
            else
              echo "❓ **注意:** CSharpier 检查失败，但未能解析出具体文件列表。" >> $GITHUB_STEP_SUMMARY
            fi
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY

          # --- 所有检查文件 ---
          echo "### 📂 所有接受检查的文件（$COUNT 个）" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -n "$CHECKED_FILES" ]; then
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$CHECKED_FILES" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "_（无文件）_" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY

          # --- 配置详情 ---
          echo "### ⚙️ 配置详情" >> $GITHUB_STEP_SUMMARY
          echo "| 配置项 | 值 |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          echo "| **检查路径** | \`${{ steps.config.outputs.check_paths }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **检查文件数** | $COUNT |" >> $GITHUB_STEP_SUMMARY
          echo "| **自动修复** | ❌ (已禁用) |" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY

          # --- CSharpier 原始输出（已解码） ---
          echo "### 📄 CSharpier 原始输出" >> $GITHUB_STEP_SUMMARY
          echo "<details><summary>点击展开原始输出</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "$RAW_OUTPUT" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          echo "</details>" >> $GITHUB_STEP_SUMMARY

  # =============================================================================  
  # 阶段2: 单元测试 - 运行Unity项目中的单元测试
  # =============================================================================
  unity-tests:
    name: 🧪 Unity单元测试
    runs-on: ubuntu-latest
    needs: [flow-prediction, code-style-check]
    if: |
      always() && 
      needs.flow-prediction.outputs.should_run_tests == 'true' && 
      (needs.code-style-check.result == 'success' || needs.code-style-check.result == 'skipped')
    outputs:
      edit_passed: ${{ steps.parse-results.outputs.edit_passed }}
      edit_failed: ${{ steps.parse-results.outputs.edit_failed }}
      edit_skipped: ${{ steps.parse-results.outputs.edit_skipped }}
      edit_total: ${{ steps.parse-results.outputs.edit_total }}
      play_passed: ${{ steps.parse-results.outputs.play_passed }}
      play_failed: ${{ steps.parse-results.outputs.play_failed }}
      play_skipped: ${{ steps.parse-results.outputs.play_skipped }}
      play_total: ${{ steps.parse-results.outputs.play_total }}
      test_status: ${{ steps.parse-results.outputs.test_status }}
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          lfs: true
          submodules: recursive

      - name: 📖 加载测试配置
        id: load-test-config  
        run: |
          echo "🔧 加载单元测试配置..."
          
          CONFIG_FILE=".github/workflows/Pipeline Config/pipeline-settings.json"
          
          # 提取测试配置
          EDIT_MODE_PATH=$(jq -r '.jobs.unit_tests.settings.testPaths.editMode' "$CONFIG_FILE")
          PLAY_MODE_PATH=$(jq -r '.jobs.unit_tests.settings.testPaths.playMode' "$CONFIG_FILE")
          GENERATE_COVERAGE=$(jq -r '.jobs.unit_tests.settings.generateCoverage' "$CONFIG_FILE")
          QUIET_MODE=$(jq -r '.jobs.unit_tests.settings.quietMode' "$CONFIG_FILE")
          UNITY_VERSION=$(jq -r '.project.unityVersion' "$CONFIG_FILE")
          
          echo "Unity版本: $UNITY_VERSION"
          echo "EditMode测试路径: $EDIT_MODE_PATH"
          echo "PlayMode测试路径: $PLAY_MODE_PATH"  
          echo "生成覆盖率: $GENERATE_COVERAGE"
          echo "静默模式: $QUIET_MODE"
          
          echo "unity_version=$UNITY_VERSION" >> $GITHUB_OUTPUT
          echo "edit_mode_path=$EDIT_MODE_PATH" >> $GITHUB_OUTPUT
          echo "play_mode_path=$PLAY_MODE_PATH" >> $GITHUB_OUTPUT
          echo "generate_coverage=$GENERATE_COVERAGE" >> $GITHUB_OUTPUT
          echo "quiet_mode=$QUIET_MODE" >> $GITHUB_OUTPUT

      - name: 💾 缓存Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-

      - name: 🧪 运行EditMode测试
        uses: game-ci/unity-test-runner@v4
        id: edit-tests
        continue-on-error: true
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        with:
          unityVersion: ${{ steps.load-test-config.outputs.unity_version }}
          testMode: EditMode
          artifactsPath: artifacts/editmode

      - name: 🎮 运行PlayMode测试  
        uses: game-ci/unity-test-runner@v4
        id: play-tests
        continue-on-error: true
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        with:
          unityVersion: ${{ steps.load-test-config.outputs.unity_version }}
          testMode: PlayMode
          artifactsPath: artifacts/playmode

      - name: 📊 解析测试结果
        id: parse-results
        if: always()
        run: |
          echo "🔍 正在解析测试结果 XML..."
          
          # 解析 EditMode
          EDIT_FILE="artifacts/editmode/editmode.xml"
          if [ -f "$EDIT_FILE" ]; then
            EP=$(grep -oP 'passed="\d+"' "$EDIT_FILE" | head -1 | grep -oP '\d+' || echo "0")
            EF=$(grep -oP 'failed="\d+"' "$EDIT_FILE" | head -1 | grep -oP '\d+' || echo "0")
            ES=$(grep -oP 'skipped="\d+"' "$EDIT_FILE" | head -1 | grep -oP '\d+' || echo "0")
            ET=$(grep -oP 'total="\d+"' "$EDIT_FILE" | head -1 | grep -oP '\d+' || echo "0")
          else
            EP=0; EF=0; ES=0; ET=0
          fi
          
          # 解析 PlayMode
          PLAY_FILE="artifacts/playmode/playmode.xml"
          if [ -f "$PLAY_FILE" ]; then
            PP=$(grep -oP 'passed="\d+"' "$PLAY_FILE" | head -1 | grep -oP '\d+' || echo "0")
            PF=$(grep -oP 'failed="\d+"' "$PLAY_FILE" | head -1 | grep -oP '\d+' || echo "0")
            PS=$(grep -oP 'skipped="\d+"' "$PLAY_FILE" | head -1 | grep -oP '\d+' || echo "0")
            PT=$(grep -oP 'total="\d+"' "$PLAY_FILE" | head -1 | grep -oP '\d+' || echo "0")
          else
            PP=0; PF=0; PS=0; PT=0
          fi
          
          echo "edit_passed=$EP" >> $GITHUB_OUTPUT
          echo "edit_failed=$EF" >> $GITHUB_OUTPUT
          echo "edit_skipped=$ES" >> $GITHUB_OUTPUT
          echo "edit_total=$ET" >> $GITHUB_OUTPUT
          echo "play_passed=$PP" >> $GITHUB_OUTPUT
          echo "play_failed=$PF" >> $GITHUB_OUTPUT
          echo "play_skipped=$PS" >> $GITHUB_OUTPUT
          echo "play_total=$PT" >> $GITHUB_OUTPUT
          
          TOTAL_FAILED=$((EF + PF))
          if [ $TOTAL_FAILED -eq 0 ]; then
            echo "test_status=success" >> $GITHUB_OUTPUT
          else
            echo "test_status=failure" >> $GITHUB_OUTPUT
          fi
          
          echo "📊 统计结果:"
          echo "  EditMode: $EP 通过, $EF 失败, $ES 跳过, 总数 $ET"
          echo "  PlayMode: $PP 通过, $PF 失败, $PS 跳过, 总数 $PT"

      - name: 📊 上传测试结果
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unity-test-results
          path: artifacts/

      - name: 📋 测试结果摘要
        if: always()
        run: |
          EP=${{ steps.parse-results.outputs.edit_passed }}
          EF=${{ steps.parse-results.outputs.edit_failed }}
          ES=${{ steps.parse-results.outputs.edit_skipped }}
          ET=${{ steps.parse-results.outputs.edit_total }}
          
          PP=${{ steps.parse-results.outputs.play_passed }}
          PF=${{ steps.parse-results.outputs.play_failed }}
          PS=${{ steps.parse-results.outputs.play_skipped }}
          PT=${{ steps.parse-results.outputs.play_total }}
          
          echo "## 🧪 Unity单元测试结果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ $((EF + PF)) -eq 0 ]; then
            echo "✅ **测试状态:** 全部通过" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **测试状态:** 发现失败项" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📊 测试统计" >> $GITHUB_STEP_SUMMARY
          echo "| 模式 | 总数 | 通过 | 失败 | 跳过 | 通过率 |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- | :--- | :--- | :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          
          # 计算通过率
          if [ $ET -gt 0 ]; then ERATE=$((EP * 100 / ET))%; else ERATE="-"; fi
          if [ $PT -gt 0 ]; then PRATE=$((PP * 100 / PT))%; else PRATE="-"; fi
          
          echo "| EditMode | $ET | $EP | $EF | $ES | $ERATE |" >> $GITHUB_STEP_SUMMARY
          echo "| PlayMode | $PT | $PP | $PF | $PS | $PRATE |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "<details><summary>点击查看测试配置详情</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**测试环境:**" >> $GITHUB_STEP_SUMMARY
          echo "- Unity版本: \`${{ steps.load-test-config.outputs.unity_version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- EditMode路径: \`${{ steps.load-test-config.outputs.edit_mode_path }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- PlayMode路径: \`${{ steps.load-test-config.outputs.play_mode_path }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- 覆盖率报告: \`${{ steps.load-test-config.outputs.generate_coverage }}\`" >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY

      - name: 🚨 强制失败（如果存在失败测试）
        if: steps.parse-results.outputs.test_status == 'failure'
        run: |
          echo "❌ 发现测试失败，工作流将终止。"
          exit 1

  # =============================================================================
  # 阶段3: 构建测试 - 构建Windows和macOS版本  
  # =============================================================================
  build-tests:
    name: 🔨 构建测试
    needs: [flow-prediction, unity-tests] 
    if: |
      always() &&
      needs.flow-prediction.outputs.should_run_build == 'true' &&
      (needs.unity-tests.result == 'success' || needs.unity-tests.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            buildTarget: StandaloneWindows64
            displayName: Windows 64位
          - os: macos-latest  
            buildTarget: StandaloneOSX
            displayName: macOS (ARM)
    
    runs-on: ${{ matrix.os }}
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          lfs: true
          submodules: recursive

      - name: 📖 加载构建配置
        id: load-build-config
        run: |
          echo "🔧 加载构建配置..."
          
          CONFIG_FILE=".github/workflows/Pipeline Config/pipeline-settings.json"
          
          UNITY_VERSION=$(jq -r '.project.unityVersion' "$CONFIG_FILE")
          PROJECT_NAME=$(jq -r '.project.name' "$CONFIG_FILE")
          BUILD_TYPE="${{ needs.flow-prediction.outputs.build_type }}"
          RETENTION_DAYS=$(jq -r '.jobs.build_tests.settings.retentionDays' "$CONFIG_FILE")
          
          echo "Unity版本: $UNITY_VERSION"
          echo "项目名称: $PROJECT_NAME"  
          echo "构建类型: $BUILD_TYPE"
          echo "保留天数: $RETENTION_DAYS"
          echo "构建目标: ${{ matrix.buildTarget }}"
          echo "显示名称: ${{ matrix.displayName }}"
          
          echo "unity_version=$UNITY_VERSION" >> $GITHUB_OUTPUT
          echo "project_name=$PROJECT_NAME" >> $GITHUB_OUTPUT
          echo "build_type=$BUILD_TYPE" >> $GITHUB_OUTPUT
          echo "retention_days=$RETENTION_DAYS" >> $GITHUB_OUTPUT

      - name: 💾 缓存Unity Library  
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ matrix.buildTarget }}-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-${{ matrix.buildTarget }}-
            Library-

      - name: 🔨 Unity构建
        id: unity-build
        uses: game-ci/unity-builder@v4
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        with:
          unityVersion: ${{ steps.load-build-config.outputs.unity_version }}
          targetPlatform: ${{ matrix.buildTarget }}
          buildName: ${{ steps.load-build-config.outputs.project_name }}
          
      - name: 📦 确定产物名称并上传
        id: determine-artifact-name
        run: |
          # 确定产物名称
          if [[ "${{ github.event.pull_request.title }}" == *"[ADD DEPLOY]"* ]] || [[ "${{ github.event.head_commit.message }}" == *"[ADD DEPLOY]"* ]]; then
            # 使用特殊命名（用于部署）
            ARTIFACT_NAME="${{ steps.load-build-config.outputs.project_name }}_${{ matrix.buildTarget }}_${{ github.event.pull_request.title || github.ref_name }}"
            echo "使用部署专用命名: $ARTIFACT_NAME"
          else
            # 使用常规命名
            ARTIFACT_NAME="${{ steps.load-build-config.outputs.project_name }}_${{ matrix.buildTarget }}_v${{ github.run_number }}"
            echo "使用常规命名: $ARTIFACT_NAME"
          fi
          
          echo "artifact_name=$ARTIFACT_NAME" >> $GITHUB_OUTPUT

      - name: 📦 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.determine-artifact-name.outputs.artifact_name }}
          path: build/
          retention-days: ${{ steps.load-build-config.outputs.retention_days }}

      - name: 📋 构建结果摘要
        if: always()
        run: |
          # 检查前面步骤的状态
          BUILD_STATUS="${{ steps.unity-build.conclusion || 'unknown' }}"
          
          echo "## 🔨 构建测试结果 - ${{ matrix.displayName }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [[ "$BUILD_STATUS" == "success" ]]; then
            echo "✅ **构建状态:** 成功" >> $GITHUB_STEP_SUMMARY
          elif [[ "$BUILD_STATUS" == "failure" ]]; then
            echo "❌ **构建状态:** 失败" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **构建状态:** $BUILD_STATUS" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**构建信息:**" >> $GITHUB_STEP_SUMMARY
          echo "- 平台: \`${{ matrix.displayName }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- 目标: \`${{ matrix.buildTarget }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- 类型: \`${{ steps.load-build-config.outputs.build_type }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- 产物名称: \`${{ steps.determine-artifact-name.outputs.artifact_name }}\`" >> $GITHUB_STEP_SUMMARY
          
          if [[ "$BUILD_STATUS" == "failure" ]]; then
            echo "- 失败原因: 请查看构建日志了解详细错误信息" >> $GITHUB_STEP_SUMMARY
          fi

  # =============================================================================
  # 阶段4: 部署到GitHub Pages - 将构建产物部署到GitHub Pages
  # =============================================================================
  deploy-pages:
    name: 🚀 部署GitHub Pages
    runs-on: ubuntu-latest
    needs: [flow-prediction, build-tests]
    if: |
      always() &&
      needs.flow-prediction.outputs.should_run_deploy == 'true' &&
      (needs.build-tests.result == 'success' || needs.build-tests.result == 'failure')
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 📖 加载部署配置
        id: load-deploy-config
        run: |
          echo "🔧 加载部署配置..."
          
          CONFIG_FILE=".github/workflows/Pipeline Config/pipeline-settings.json"
          
          PROJECT_NAME=$(jq -r '.project.name' "$CONFIG_FILE")
          ARTIFACT_PATTERN=$(jq -r '.jobs.deploy_pages.settings.artifactNamePattern' "$CONFIG_FILE")
          BRANCH_REQUIREMENT=$(jq -r '.jobs.deploy_pages.settings.branchRequirement' "$CONFIG_FILE")
          
          echo "项目名称: $PROJECT_NAME"
          echo "产物命名模式: $ARTIFACT_PATTERN"
          echo "分支要求: $BRANCH_REQUIREMENT"
          
          # 检查当前分支是否符合要求
          CURRENT_BRANCH="${{ github.ref_name }}"
          
          # 检查是否有强制部署关键字
          if [[ "${{ github.event.pull_request.title }}" == *"[ADD DEPLOY]"* ]] || [[ "${{ github.event.head_commit.message }}" == *"[ADD DEPLOY]"* ]]; then
            echo "🔥 检测到 [ADD DEPLOY] 关键字，跳过分支限制"
            echo "✅ 强制部署：忽略分支要求 ($BRANCH_REQUIREMENT)"
            echo "branch_check=pass" >> $GITHUB_OUTPUT
          elif [[ "$CURRENT_BRANCH" =~ $BRANCH_REQUIREMENT ]]; then
            echo "✅ 当前分支 ($CURRENT_BRANCH) 符合部署要求"
            echo "branch_check=pass" >> $GITHUB_OUTPUT
          else
            echo "❌ 当前分支 ($CURRENT_BRANCH) 不符合部署要求 ($BRANCH_REQUIREMENT)"
            echo "❓ 提示：使用 [ADD DEPLOY] 关键字可强制部署"
            echo "branch_check=fail" >> $GITHUB_OUTPUT
          fi
          
          echo "project_name=$PROJECT_NAME" >> $GITHUB_OUTPUT
          echo "current_branch=$CURRENT_BRANCH" >> $GITHUB_OUTPUT

      - name: 📥 下载构建产物
        id: download-artifacts
        if: steps.load-deploy-config.outputs.branch_check == 'pass'
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern: ${{ steps.load-deploy-config.outputs.project_name }}_*_v${{ github.run_number }}
          path: ./artifacts
          merge-multiple: true

      - name: 📄 准备Pages内容
        id: prepare-pages
        if: steps.load-deploy-config.outputs.branch_check == 'pass'
        run: |
          echo "📄 准备GitHub Pages部署内容..."
          
          mkdir -p ./pages
          
          # 创建简单的索引页面
          cat > ./pages/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
              <title>${{ steps.load-deploy-config.outputs.project_name }} - 构建产物</title>
              <meta charset="utf-8">
              <style>
                  body { font-family: Arial, sans-serif; margin: 40px; }
                  .header { border-bottom: 1px solid #ccc; padding-bottom: 20px; }
                  .artifact { margin: 20px 0; padding: 20px; border: 1px solid #ddd; border-radius: 5px; }
                  .download-link { color: #0366d6; text-decoration: none; }
                  .download-link:hover { text-decoration: underline; }
              </style>
          </head>
          <body>
              <div class="header">
                  <h1>${{ steps.load-deploy-config.outputs.project_name }}</h1>
                  <p>构建版本: v${{ github.run_number }}</p>
                  <p>构建分支: ${{ steps.load-deploy-config.outputs.current_branch }}</p>
                  <p>构建时间: $(date)</p>
              </div>
              
              <h2>📦 可用的构建产物</h2>
          EOF
          
          # 列出所有构建产物
          if [[ -d "./artifacts" ]]; then
            for artifact in ./artifacts/*/; do
              if [[ -d "$artifact" ]]; then
                artifact_name=$(basename "$artifact")
                echo "              <div class=\"artifact\">" >> ./pages/index.html
                echo "                  <h3>🎯 $artifact_name</h3>" >> ./pages/index.html
                echo "                  <p><a href=\"$artifact_name/\" class=\"download-link\">📥 查看内容</a></p>" >> ./pages/index.html
                echo "              </div>" >> ./pages/index.html
              fi
            done
            
            # 复制构建产物到pages目录
            cp -r ./artifacts/* ./pages/
          else
            echo "              <p>❌ 没有找到构建产物</p>" >> ./pages/index.html
          fi
          
          echo "          </body>" >> ./pages/index.html
          echo "          </html>" >> ./pages/index.html
          
          echo "✅ Pages内容准备完成"

      - name: 🔧 配置Pages
        if: steps.load-deploy-config.outputs.branch_check == 'pass'
        uses: actions/configure-pages@v4

      - name: 📤 上传Pages内容
        if: steps.load-deploy-config.outputs.branch_check == 'pass'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./pages

      - name: 🚀 部署到Pages
        if: steps.load-deploy-config.outputs.branch_check == 'pass'
        id: deployment
        uses: actions/deploy-pages@v4

      - name: 📋 部署结果摘要
        if: always()
        run: |
          echo "## 🚀 GitHub Pages部署结果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # 检查各个步骤的状态
          BRANCH_CHECK="${{ steps.load-deploy-config.outputs.branch_check }}"
          DOWNLOAD_STATUS="${{ steps.download-artifacts.conclusion || 'unknown' }}"
          PREPARE_STATUS="${{ steps.prepare-pages.conclusion || 'unknown' }}"
          DEPLOY_STATUS="${{ steps.deployment.conclusion || 'unknown' }}"
          
          echo "🔍 调试信息:"
          echo "- 分支检查: $BRANCH_CHECK"
          echo "- 下载产物: $DOWNLOAD_STATUS"
          echo "- 准备内容: $PREPARE_STATUS"
          echo "- 部署状态: $DEPLOY_STATUS"
          echo ""
          
          if [[ "$BRANCH_CHECK" == "pass" ]]; then
            # 分支检查通过，检查部署结果
            if [[ "$DEPLOY_STATUS" == "success" ]]; then
              echo "✅ **部署状态:** 成功" >> $GITHUB_STEP_SUMMARY
            elif [[ "$DEPLOY_STATUS" == "failure" ]]; then
              echo "❌ **部署状态:** 失败" >> $GITHUB_STEP_SUMMARY
            elif [[ "$DEPLOY_STATUS" == "skipped" ]]; then
              echo "⏭️ **部署状态:** 跳过" >> $GITHUB_STEP_SUMMARY
            else
              echo "⚠️ **部署状态:** $DEPLOY_STATUS" >> $GITHUB_STEP_SUMMARY
            fi
            
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**部署信息:**" >> $GITHUB_STEP_SUMMARY
            echo "- 项目名称: \`${{ steps.load-deploy-config.outputs.project_name }}\`" >> $GITHUB_STEP_SUMMARY
            echo "- 构建版本: \`v${{ github.run_number }}\`" >> $GITHUB_STEP_SUMMARY
            echo "- 源分支: \`${{ steps.load-deploy-config.outputs.current_branch }}\`" >> $GITHUB_STEP_SUMMARY
            
            # 检查是否是强制部署
            if [[ "${{ github.event.pull_request.title }}" == *"[ADD DEPLOY]"* ]] || [[ "${{ github.event.head_commit.message }}" == *"[ADD DEPLOY]"* ]]; then
              echo "- 部署类型: \`强制部署 (通过 [ADD DEPLOY] 关键字)\`" >> $GITHUB_STEP_SUMMARY
            else
              echo "- 部署类型: \`标准部署 (符合分支要求)\`" >> $GITHUB_STEP_SUMMARY
            fi
            
            if [[ -n "${{ steps.deployment.outputs.page_url }}" ]]; then
              echo "- 访问链接: [${{ steps.deployment.outputs.page_url }}](${{ steps.deployment.outputs.page_url }})" >> $GITHUB_STEP_SUMMARY
            fi
            
            # 显示错误信息（如果有）
            if [[ "$DEPLOY_STATUS" == "failure" ]]; then
              echo "- 失败原因: 请查看部署日志了解详细错误信息" >> $GITHUB_STEP_SUMMARY
            fi
            
          else
            echo "⏭️ **部署状态:** 跳过" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**跳过原因:** 当前分支 (\`${{ steps.load-deploy-config.outputs.current_branch }}\`) 不符合部署要求" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "💡 **提示:** 在PR标题中添加 \`[ADD DEPLOY]\` 关键字可强制启用部署" >> $GITHUB_STEP_SUMMARY
          fi

  # =============================================================================
  # 阶段5: 执行详情汇总 - 汇总整个流水线的执行情况
  # =============================================================================
  execution-summary:
    name: 📊 执行详情汇总
    runs-on: ubuntu-latest
    needs: [flow-prediction, code-style-check, unity-tests, build-tests, deploy-pages]
    if: always()

    steps:
      - name: 📊 生成执行摘要
        run: |
          echo "📊 汇总CI/CD流水线执行结果..."

          # 收集各阶段状态
          FLOW_STATUS="${{ needs.flow-prediction.result }}"
          STYLE_STATUS="${{ needs.code-style-check.result }}"
          TEST_STATUS="${{ needs.unity-tests.result }}" 
          BUILD_STATUS="${{ needs.build-tests.result }}"
          DEPLOY_STATUS="${{ needs.deploy-pages.result }}"

          # 收集测试详细数据
          EP="${{ needs.unity-tests.outputs.edit_passed || 0 }}"
          EF="${{ needs.unity-tests.outputs.edit_failed || 0 }}"
          ET="${{ needs.unity-tests.outputs.edit_total || 0 }}"
          PP="${{ needs.unity-tests.outputs.play_passed || 0 }}"
          PF="${{ needs.unity-tests.outputs.play_failed || 0 }}"
          PT="${{ needs.unity-tests.outputs.play_total || 0 }}"

          # 生成详细的执行摘要
          echo "# 🚀 CI/CD流水线执行详情" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # 总体状态大徽章
          if [[ "$FLOW_STATUS" == "success" && 
                ("$STYLE_STATUS" == "success" || "$STYLE_STATUS" == "skipped") &&
                ("$TEST_STATUS" == "success" || "$TEST_STATUS" == "skipped") ]]; then
            echo "## 🟢 最终结果: SUCCESS" >> $GITHUB_STEP_SUMMARY
          else
            echo "## 🔴 最终结果: FAILURE" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📝 基础信息" >> $GITHUB_STEP_SUMMARY
          echo "- **流程描述:** ${{ needs.flow-prediction.outputs.pipeline_description }}" >> $GITHUB_STEP_SUMMARY
          echo "- **构建类型:** \`${{ needs.flow-prediction.outputs.build_type }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **触发事件:** \`${{ github.event_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **执行时间:** $(date)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### 📋 阶段执行状态" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 阶段 | 状态 | 详情 |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- | :--- |" >> $GITHUB_STEP_SUMMARY

          # 辅助函数: 转换状态为图标
          get_icon() {
            case "$1" in
              "success") echo "✅ 成功" ;;
              "failure") echo "❌ 失败" ;;
              "skipped") echo "⏭️ 跳过" ;;
              "cancelled") echo "🚫 取消" ;;
              *) echo "❓ 未知 ($1)" ;;
            esac
          }

          echo "| 📋 流程预测 | $(get_icon $FLOW_STATUS) | 分析完成 |" >> $GITHUB_STEP_SUMMARY

          # 代码检查详情
          STYLE_DESC="-"
          if [[ "$STYLE_STATUS" == "success" ]]; then STYLE_DESC="代码格式符合规范"; fi
          if [[ "$STYLE_STATUS" == "failure" ]]; then STYLE_DESC="发现代码格式问题"; fi
          echo "| 🎨 代码检查 | $(get_icon $STYLE_STATUS) | $STYLE_DESC |" >> $GITHUB_STEP_SUMMARY

          # 单元测试详情
          TEST_DESC="-"
          if [[ "$TEST_STATUS" == "success" || "$TEST_STATUS" == "failure" ]]; then
            TOTAL_P=$((EP + PP))
            TOTAL_F=$((EF + PF))
            TOTAL_T=$((ET + PT))
            TEST_DESC="通过: **$TOTAL_P**, 失败: **$TOTAL_F**, 总数: **$TOTAL_T**"
          fi
          echo "| 🧪 单元测试 | $(get_icon $TEST_STATUS) | $TEST_DESC |" >> $GITHUB_STEP_SUMMARY

          # 构建测试
          echo "| 🔨 构建测试 | $(get_icon $BUILD_STATUS) | 包含 Windows/macOS 平台 |" >> $GITHUB_STEP_SUMMARY

          # 部署
          DEPLOY_DESC="-"
          if [[ "$DEPLOY_STATUS" == "success" ]]; then DEPLOY_DESC="已部署至 Pages"; fi
          echo "| 🚀 Pages部署 | $(get_icon $DEPLOY_STATUS) | $DEPLOY_DESC |" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY

          # 单元测试详细统计（如果执行了）
          if [[ "$TEST_STATUS" == "success" || "$TEST_STATUS" == "failure" ]]; then
            echo "### 🧪 单元测试详细统计" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| 测试模式 | 总数 | 通过 | 失败 | 通过率 |" >> $GITHUB_STEP_SUMMARY
            echo "| :--- | :--- | :--- | :--- | :--- |" >> $GITHUB_STEP_SUMMARY

            calc_rate() {
              if [ "$2" -gt 0 ]; then echo "$(( $1 * 100 / $2 ))%"; else echo "-"; fi
            }

            echo "| EditMode | $ET | $EP | $EF | $(calc_rate $EP $ET) |" >> $GITHUB_STEP_SUMMARY
            echo "| PlayMode | $PT | $PP | $PF | $(calc_rate $PP $PT) |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          # 部署链接（如果成功）
          if [[ "$DEPLOY_STATUS" == "success" ]]; then
            echo "### 🔗 相关链接" >> $GITHUB_STEP_SUMMARY
            echo "- 🌐 **预览地址:** [点击访问 GitHub Pages](${{ github.event.repository.homepage || 'https://' + github.repository_owner + '.github.io/' + github.event.repository.name }})" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          # 跳过原因
          if [[ -n "${{ needs.flow-prediction.outputs.skip_reason }}" ]]; then
            echo "> 💡 **提示:** ${{ needs.flow-prediction.outputs.skip_reason }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          # 最终退出码判断
          FAILED=0
          if [[ "$FLOW_STATUS" != "success" ]]; then FAILED=1; fi
          if [[ "$STYLE_STATUS" == "failure" ]]; then FAILED=1; fi
          if [[ "$TEST_STATUS" == "failure" ]]; then FAILED=1; fi

          if [[ $FAILED -eq 1 ]]; then
            exit 1
          fi