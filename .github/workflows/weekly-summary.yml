name: "每周任务总结 📊"

on:
  schedule:
    - cron: '0 2 * * 1' # 每周一北京时间 10:00 运行 (推迟一小时，确保 DDL 提醒已完成且 API 已索引)
  workflow_dispatch:

jobs:
  summary:
    runs-on: ubuntu-latest
    steps:
      - name: 生成上周统计报表
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_PAT }}
          script: |
            const { owner, repo } = context.repo;
            const now = new Date();
            
            // 统计窗口：从 7 天前的 00:00 开始，直到现在。
            // 比如这周一 10:00 运行，统计从上周一 00:00 之后产生的所有“奶茶提醒”。
            const sinceDate = new Date();
            sinceDate.setDate(sinceDate.getDate() - 7);
            sinceDate.setHours(0, 0, 0, 0); 
            const sinceIso = sinceDate.toISOString();

            console.log(`统计起始时间: ${sinceIso}`);

            // 获取最近更新过的 Issue
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner, repo, state: 'all', since: sinceIso
            });

            const stats = {};
            const overdueDetails = [];

            for (const issue of issues) {
              if (issue.pull_request) continue;

              // 获取该 Issue 下在统计周期内的所有评论
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner, repo, issue_number: issue.number, since: sinceIso
              });

              // 使用正则匹配，兼容 **奶茶** 这种加粗格式
              const overdueComment = comments.find(c => /奶茶.*喝了/.test(c.body));

              if (overdueComment) {
                const assignees = issue.assignees.map(a => a.login);
                const target = assignees.length > 0 ? assignees : ['未分配人员'];
                
                target.forEach(name => {
                  stats[name] = (stats[name] || 0) + 1;
                });

                overdueDetails.push(`| [#${issue.number}](${issue.html_url}) | ${issue.title} | ${target.join(', ')} |`);
              }
            }

            // 构建报表
            let reportBody = `## 📊 上周 DDL 逾期统计报告 \n\n`;
            reportBody += `> 统计周期: ${sinceDate.toLocaleDateString()} - ${now.toLocaleDateString()} \n`;
            reportBody += `> *注：包含周一早晨生成的针对上周日到期任务的统计* \n\n`;
            
            reportBody += `### 🥛 奶茶欠账榜 (本周新增) \n`;
            reportBody += `| 负责人 | 本周逾期次数 | 应请奶茶 (杯) | \n`;
            reportBody += `| --- | --- | --- | \n`;
            
            let totalCups = 0;
            const sortedStats = Object.entries(stats).sort((a, b) => b[1] - a[1]);
            for (const [name, count] of sortedStats) {
              reportBody += `| @${name} | ${count} | ${count} 🥤 | \n`;
              totalCups += count;
            }
            reportBody += `| **总计** | **-** | **${totalCups} 🥤** | \n\n`;

            if (overdueDetails.length > 0) {
              reportBody += `### 🔗 逾期清单 \n`;
              reportBody += `| Issue | 标题 | 负责人 | \n`;
              reportBody += `| --- | --- | --- | \n`;
              reportBody += overdueDetails.join('\n') + `\n\n`;
            } else {
              reportBody += `🎉 **太棒了！上周没有任何人逾期。** \n\n`;
            }

            reportBody += `--- \n *此报表由 GitHub Action 自动生成。*`;

            const summaryIssue = await github.rest.issues.create({
              owner, repo,
              title: `📅 每周工作总结及奶茶统计 (${now.toISOString().split('T')[0]})`,
              body: reportBody,
              labels: ['summary', 'Milk Tea']
            });

            const summaryNumber = summaryIssue.data.number;
            const milkTeaIssues = [];

            for (const [name, count] of sortedStats) {
              if (name === '未分配人员') continue;
              for (let i = 1; i <= count; i++) {
                const milkTeaIssue = await github.rest.issues.create({
                  owner, repo,
                  title: `[Milk Tea] 请喝奶茶任务 (${i}/${count}) - @${name}`,
                  body: `🥤 **奶茶请客任务** \n\n 负责人: @${name} \n 欠账序号: ${i} / ${count} \n 来源总结: #${summaryNumber} \n\n 请在请客完成后手动关闭此 Issue。`,
                  labels: ['Milk Tea'],
                  assignees: [name]
                });
                milkTeaIssues.push(`- [ ] @${name} 的奶茶任务 (${i}/${count}): #${milkTeaIssue.data.number}`);
              }
            }

            if (milkTeaIssues.length > 0) {
              const newBody = reportBody + `\n\n### 🛠️ 任务跟踪 (自动维护) \n` + milkTeaIssues.join('\n');
              await github.rest.issues.update({
                owner, repo, issue_number: summaryNumber,
                body: newBody
              });
            }

            await core.summary
              .addHeading('📊 每周统计任务执行报告')
              .addRaw(`已成功生成上周统计报表：[Issue #${summaryNumber}](${summaryIssue.data.html_url})`)
              .write();
