name: Add Issue to Project

on:
  issues:
    types: [opened]
  workflow_dispatch:
    # 手动触发不再需要输入，自动处理所有 open 的 issue

jobs:
  add-to-project:
    runs-on: ubuntu-latest
    steps:
      # -------------------------------
      # 1️⃣ 获取 Project 相关配置信息
      # -------------------------------
      - name: 获取 Project 配置
        id: get_project
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_PAT }}
          script: |
            const org = "Vanishing-Games";
            const projectName = "创似我算了";

            const result = await github.graphql(`
              query {
                organization(login: "${org}") {
                  projectsV2(first: 20) {
                    nodes {
                      id
                      title
                      fields(first: 20) {
                        nodes {
                          __typename
                          ... on ProjectV2FieldCommon { id name }
                          ... on ProjectV2SingleSelectField { options { id name } }
                        }
                      }
                    }
                  }
                }
              }
            `);

            const project = result.organization.projectsV2.nodes.find(p => p.title === projectName);
            if (!project) throw new Error("未找到目标 Project: " + projectName);

            const fields = project.fields.nodes.map(f => ({
              id: f.id,
              name: f.name,
              options: f.__typename === "ProjectV2SingleSelectField" ? f.options : []
            }));

            const priorityField = fields.find(f => f.name === "优先级");
            const ddlField = fields.find(f => f.name === "DDL");
            const p2Option = priorityField?.options.find(o => o.name === "P2");

            if (!priorityField || !ddlField || !p2Option) {
              throw new Error("Project 字段配置不完整，请检查‘优先级’、‘DDL’字段及‘P2’选项是否存在。");
            }

            core.setOutput("project_id", project.id);
            core.setOutput("priority_field_id", priorityField.id);
            core.setOutput("p2_option_id", p2Option.id);
            core.setOutput("ddl_field_id", ddlField.id);

      # -------------------------------
      # 2️⃣ 批量处理逻辑
      # -------------------------------
      - name: 批量处理 Issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_PAT }}
          script: |
            const { owner, repo } = context.repo;
            const projectId = "${{ steps.get_project.outputs.project_id }}";
            const priorityFieldId = "${{ steps.get_project.outputs.priority_field_id }}";
            const p2OptionId = "${{ steps.get_project.outputs.p2_option_id }}";
            const ddlFieldId = "${{ steps.get_project.outputs.ddl_field_id }}";

            // 1. 确定目标 Issue 列表
            let targetIssues = [];
            if (context.eventName === 'workflow_dispatch') {
              console.log("手动触发：拉取所有打开的 Issue...");
              targetIssues = await github.paginate(github.rest.issues.listForRepo, {
                owner, repo, state: 'open'
              });
            } else {
              targetIssues = [context.payload.issue];
            }

            const stats = { total: targetIssues.length, assigned: 0, linked: 0, priority_set: 0, ddl_set: 0, skipped: 0 };
            const details = [];

            for (const issue of targetIssues) {
              const issueNumber = issue.number;
              const issueNodeId = issue.node_id;
              const labels = issue.labels.map(l => l.name);

              // --- 步骤 0: 过滤 ---
              if (issue.pull_request || labels.includes('Milk Tea') || labels.includes('summary')) {
                stats.skipped++;
                console.log(`Issue #${issueNumber}: 跳过 (PR 或 奶茶/总结任务)`);
                continue;
              }

              let currentAction = { num: issueNumber, title: issue.title, steps: [] };

              try {
                // --- 步骤 A: 自动分配负责人 ---
                if (issue.assignees.length === 0) {
                  const opener = issue.user.login;
                  await github.rest.issues.addAssignees({ owner, repo, issue_number: issueNumber, assignees: [opener] });
                  stats.assigned++;
                  currentAction.steps.push("👤 已分配创建者");
                }

                // --- 步骤 B: 关联到 Project ---
                const addItem = await github.graphql(`
                  mutation($projectId: ID!, $contentId: ID!) {
                    addProjectV2ItemById(input: { projectId: $projectId, contentId: $contentId }) {
                      item { id }
                    }
                  }
                `, { projectId, contentId: issueNodeId });
                const itemId = addItem.addProjectV2ItemById.item.id;
                stats.linked++;
                currentAction.steps.push("🔗 已关联 Project");

                // --- 步骤 C: 检查并设置字段 ---
                const itemQuery = await github.graphql(`
                  query($itemId: ID!) {
                    node(id: $itemId) {
                      ... on ProjectV2Item {
                        fieldValues(first: 20) {
                          nodes {
                            __typename
                            ... on ProjectV2ItemFieldSingleSelectValue {
                              field { ... on ProjectV2FieldCommon { id name } }
                              name
                              optionId
                            }
                            ... on ProjectV2ItemFieldDateValue {
                              field { ... on ProjectV2FieldCommon { id name } }
                              date
                            }
                          }
                        }
                      }
                    }
                  }
                `, { itemId });

                const fieldValues = itemQuery.node.fieldValues.nodes;

                // 检查 Priority
                const priorityValue = fieldValues.find(f => f.field?.id === priorityFieldId);
                if (!priorityValue || !priorityValue.name) {
                  await github.graphql(`
                    mutation {
                      updateProjectV2ItemFieldValue(input: {
                        projectId: "${projectId}", itemId: "${itemId}", fieldId: "${priorityFieldId}",
                        value: { singleSelectOptionId: "${p2OptionId}" }
                      }) { projectV2Item { id } }
                    }
                  `);
                  stats.priority_set++;
                  currentAction.steps.push("🚩 已设 P2");
                }

                // 检查 DDL
                const ddlValue = fieldValues.find(f => f.field?.id === ddlFieldId);
                if (!ddlValue || !ddlValue.date) {
                  const threeDaysLater = new Date();
                  threeDaysLater.setDate(threeDaysLater.getDate() + 3);
                  const ddlDateStr = threeDaysLater.toISOString().split("T")[0];
                  await github.graphql(`
                    mutation {
                      updateProjectV2ItemFieldValue(input: {
                        projectId: "${projectId}", itemId: "${itemId}", fieldId: "${ddlFieldId}",
                        value: { date: "${ddlDateStr}" }
                      }) { projectV2Item { id } }
                    }
                  `);
                  stats.ddl_set++;
                  currentAction.steps.push("📅 已设 3天DDL");
                }

                details.push([`#${issueNumber}`, issue.title, currentAction.steps.join(' | ') || "✅ 无需更改"]);
              } catch (e) {
                console.error(`处理 Issue #${issueNumber} 出错:`, e);
                details.push([`#${issueNumber}`, issue.title, `❌ 失败: ${e.message}`]);
              }
            }

            // 3. 输出强化 Summary
            await core.summary
              .addHeading(context.eventName === 'workflow_dispatch' ? '🚀 批量 Issue 初始化报告' : '✅ 新 Issue 初始化报告')
              .addRaw(`本次任务处理了 **${stats.total}** 个项目（忽略了 ${stats.skipped} 个 PR/奶茶/总结任务）。`)
              .addTable([
                ['指标名称', '处理数量'],
                ['👤 自动分配负责人', stats.assigned.toString()],
                ['🔗 关联 Project', stats.linked.toString()],
                ['🚩 补全 P2 优先级', stats.priority_set.toString()],
                ['📅 设置默认 DDL', stats.ddl_set.toString()]
              ])
              .addHeading('📝 处理详情清单', 3)
              .addTable([
                ['Issue', '标题', '执行操作'],
                ...details
              ])
              .write();
