name: Add Issue to Project

on:
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: '手动指定要处理的 Issue 编号'
        required: true
        type: string

jobs:
  add-to-project:
    runs-on: ubuntu-latest
    steps:
      # ... (第一步 get_project 保持不变) ...
      - name: 获取 Project 相关 ID
        id: get_project
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_PAT }}
          script: |
            const org = "Vanishing-Games";
            const projectName = "创似我算了";

            const result = await github.graphql(`
              query {
                organization(login: "${org}") {
                  projectsV2(first: 20) {
                    nodes {
                      id
                      title
                      fields(first: 20) {
                        nodes {
                          __typename
                          ... on ProjectV2FieldCommon { id name }
                          ... on ProjectV2SingleSelectField { options { id name } }
                        }
                      }
                    }
                  }
                }
              }
            `);

            const project = result.organization.projectsV2.nodes.find(p => p.title === projectName);
            if (!project) throw new Error("未找到目标 Project: " + projectName);

            const fields = project.fields.nodes.map(f => ({
              id: f.id,
              name: f.name,
              options: f.__typename === "ProjectV2SingleSelectField" ? f.options : []
            }));

            const priorityField = fields.find(f => f.name === "优先级");
            const ddlField = fields.find(f => f.name === "DDL");
            const p2Option = priorityField.options.find(o => o.name === "P2");

            if (!priorityField) throw new Error("未找到优先级字段");
            if (!ddlField) throw new Error("未找到DDL字段");
            if (!p2Option) throw new Error("未找到 P2 选项");

            core.setOutput("project_id", project.id);
            core.setOutput("priority_field_id", priorityField.id);
            core.setOutput("p2_option_id", p2Option.id);
            core.setOutput("ddl_field_id", ddlField.id);

            core.summary
              .addHeading('📌 获取到的 Project 相关信息')
              .addList([
                `Project 名称: ${project.title}`,
                `Project ID: ${project.id}`,
                `优先级字段 ID: ${priorityField.id}`,
                `P2 选项 ID: ${p2Option.id}`,
                `DDL 字段 ID: ${ddlField.id}`
              ])
              .write();

      # -------------------------------
      # 2️⃣ 关联 Issue 到 Project 并设置 Priority / DDL（仅在无值时设置）
      # -------------------------------
      - name: 关联 Issue 到 Project
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_PAT }}
          script: |
            const { owner, repo } = context.repo;
            const projectId = "${{ steps.get_project.outputs.project_id }}";
            const priorityFieldId = "${{ steps.get_project.outputs.priority_field_id }}";
            const p2OptionId = "${{ steps.get_project.outputs.p2_option_id }}";
            const ddlFieldId = "${{ steps.get_project.outputs.ddl_field_id }}";

            // 自动判断数据来源
            let issue;
            if (context.eventName === 'workflow_dispatch') {
              const res = await github.rest.issues.get({
                owner, repo, issue_number: parseInt(context.payload.inputs.issue_number)
              });
              issue = res.data;
            } else {
              issue = context.payload.issue;
            }

            const issueNodeId = issue.node_id;
            const issueNumber = issue.number;
            const opener = issue.user.login;

            // --- 0. 自动分配负责人 (如果为空) ---
            let assignedTo = issue.assignees.map(a => a.login);
            if (assignedTo.length === 0) {
              await github.rest.issues.addAssignees({
                owner, repo, issue_number: issueNumber, assignees: [opener]
              });
              assignedTo = [opener];
              console.log(`Issue #${issueNumber} 无负责人，已自动分配给创建者 @${opener}`);
            }

            // 添加 Issue 到 ProjectV2
            const addItem = await github.graphql(`
              mutation($projectId: ID!, $contentId: ID!) {
                addProjectV2ItemById(input: { projectId: $projectId, contentId: $contentId }) {
                  item { id }
                }
              }
            `, { projectId, contentId: issueNodeId });

            const itemId = addItem.addProjectV2ItemById.item.id;

            // 查询当前 Item 的字段值
            const itemQuery = await github.graphql(`
              query($itemId: ID!, $priorityFieldId: ID!, $ddlFieldId: ID!) {
                node(id: $itemId) {
                  ... on ProjectV2Item {
                    fieldValues(first: 10) {
                      nodes {
                        field { id name __typename }
                        ... on ProjectV2ItemFieldSingleSelectValue {
                          singleSelectOption { id name }
                        }
                        ... on ProjectV2ItemFieldDateValue {
                          date
                        }
                      }
                    }
                  }
                }
              }
            `, { itemId, priorityFieldId, ddlFieldId });

            const fieldValues = itemQuery.node.fieldValues.nodes;

            // 检查 Priority 是否已设置
            const priorityValue = fieldValues.find(f => f.field.id === priorityFieldId);
            if (!priorityValue || !priorityValue.singleSelectOption) {
              await github.graphql(`
                mutation {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: "${projectId}"
                    itemId: "${itemId}"
                    fieldId: "${priorityFieldId}"
                    value: { singleSelectOptionId: "${p2OptionId}" }
                  }) { projectV2Item { id } }
                }
              `);
            }

            // 检查 DDL 是否已设置
            const ddlValue = fieldValues.find(f => f.field.id === ddlFieldId);
            if (!ddlValue || !ddlValue.date) {
              const threeDaysLater = new Date();
              threeDaysLater.setDate(threeDaysLater.getDate() + 3);
              const ddlDateStr = threeDaysLater.toISOString().split("T")[0];

              await github.graphql(`
                mutation {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: "${projectId}"
                    itemId: "${itemId}"
                    fieldId: "${ddlFieldId}"
                    value: { date: "${ddlDateStr}" }
                  }) { projectV2Item { id } }
                }
              `);
            }

            core.summary
              .addHeading('✅ Issue 已关联到 Project')
              .addTable([
                ['属性', '值'],
                ['仓库', repo],
                ['Issue', `#${issueNumber}`],
                ['Project ID', projectId],
                ['设置优先级', priorityValue && priorityValue.singleSelectOption ? priorityValue.singleSelectOption.name : "自动分配 P2"],
                ['设置 DDL', ddlValue && ddlValue.date ? ddlValue.date : "自动分配 3天后"]
              ])
              .write();

              mutation($projectId: ID!, $contentId: ID!) {
                addProjectV2ItemById(input: { projectId: $projectId, contentId: $contentId }) {
                  item { id }
                }
              }
            `, { projectId, contentId: issueNodeId });

            const itemId = addItem.addProjectV2ItemById.item.id;

            // 查询当前 Item 的字段值
            const itemQuery = await github.graphql(`
              query($itemId: ID!, $priorityFieldId: ID!, $ddlFieldId: ID!) {
                node(id: $itemId) {
                  ... on ProjectV2Item {
                    fieldValues(first: 10) {
                      nodes {
                        field { id name __typename }
                        ... on ProjectV2ItemFieldSingleSelectValue {
                          singleSelectOption { id name }
                        }
                        ... on ProjectV2ItemFieldDateValue {
                          date
                        }
                      }
                    }
                  }
                }
              }
            `, { itemId, priorityFieldId, ddlFieldId });

            const fieldValues = itemQuery.node.fieldValues.nodes;

            // 检查 Priority 是否已设置
            const priorityValue = fieldValues.find(f => f.field.id === priorityFieldId);
            if (!priorityValue || !priorityValue.singleSelectOption) {
              await github.graphql(`
                mutation {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: "${projectId}"
                    itemId: "${itemId}"
                    fieldId: "${priorityFieldId}"
                    value: { singleSelectOptionId: "${p2OptionId}" }
                  }) { projectV2Item { id } }
                }
              `);
            }

            // 检查 DDL 是否已设置
            const ddlValue = fieldValues.find(f => f.field.id === ddlFieldId);
            if (!ddlValue || !ddlValue.date) {
              const threeDaysLater = new Date();
              threeDaysLater.setDate(threeDaysLater.getDate() + 3);
              const ddlDateStr = threeDaysLater.toISOString().split("T")[0];

              await github.graphql(`
                mutation {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: "${projectId}"
                    itemId: "${itemId}"
                    fieldId: "${ddlFieldId}"
                    value: { date: "${ddlDateStr}" }
                  }) { projectV2Item { id } }
                }
              `);
            }

            core.summary
              .addHeading('✅ Issue 已关联到 Project')
              .addTable([
                ['属性', '值'],
                ['仓库', repoName],
                ['Issue', `#${issueNumber}`],
                ['Project ID', projectId],
                ['设置优先级', priorityValue && priorityValue.singleSelectOption ? priorityValue.singleSelectOption.name : "自动分配 P2"],
                ['设置 DDL', ddlValue && ddlValue.date ? ddlValue.date : "自动分配 3天后"]
              ])
              .write();
