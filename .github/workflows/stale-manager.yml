name: "任务清理与回收"

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  stale-check:
    runs-on: ubuntu-latest
    steps:
      - name: 精准检测逾期或无 DDL 任务
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_PAT }}
          script: |
            const { owner, repo } = context.repo;

            // 1. 获取仓库中所有打开的 Issue
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: 'open'
            });

            const now = new Date();
            const summary = { checked: 0, stale: 0, closed: 0, recovered: 0, skipped_pr: 0 };

            for (const issue of issues) {
              const issueNumber = issue.number;
              if (issue.pull_request) {
                summary.skipped_pr++;
                continue;
              }
              
              summary.checked++;

              const isOverdue = issue.labels.some(l => l.name === 'ddl: overdue');
              const isMissingDdl = issue.labels.some(l => l.name === 'needs: ddl');
              const hasStaleLabel = issue.labels.some(l => l.name === 'stale');

              // 2. 检查最后的人类活动 (直接取最新的评论)
              const comments = await github.rest.issues.listComments({
                owner, repo, issue_number: issueNumber, 
                per_page: 20,
                sort: 'created',
                direction: 'desc'
              });

              const humanComments = comments.data.filter(c => !c.body.includes('[Action自动生成]'));
              const lastHumanActiveDate = humanComments.length > 0 
                ? new Date(humanComments[0].created_at)
                : new Date(issue.created_at);

              const silentDays = Math.floor((now - lastHumanActiveDate) / 86400000);

              console.log(`Issue #${issueNumber}: 沉默:${silentDays}天, Overdue:${isOverdue}, NoDDL:${isMissingDdl}`);

              // 3. 状态机逻辑
              if (hasStaleLabel && silentDays >= 4) {
                // 标记后又给了 1 天缓冲期 (3+1)
                await github.rest.issues.createComment({
                  owner, repo, issue_number: issueNumber,
                  body: `🛑 **任务回收通知** \n 此任务因长期未活跃（人类沉默超过 4 天），现执行自动关闭。`
                });
                await github.rest.issues.update({
                  owner, repo, issue_number: issueNumber, state: 'closed'
                });
                summary.closed++;
              } 
              else if (!hasStaleLabel && silentDays >= 3) {
                // 首次触发 stale
                const reason = isOverdue ? "任务已逾期" : (isMissingDdl ? "任务缺失 DDL" : "任务长期无进展");
                await github.rest.issues.addLabels({
                  owner, repo, issue_number: issueNumber, labels: ['stale']
                });
                await github.rest.issues.createComment({
                  owner, repo, issue_number: issueNumber,
                  body: `⚠️ **活跃度预警 [Action自动生成]** \n 检测到此任务 (${reason}) 且人类回复已中断 3 天。现已标记为 \`stale\`。如果 1 天内无人类干预，将自动关闭。`
                });
                summary.stale++;
              }
              else if (hasStaleLabel && silentDays < 3) {
                // 人类活跃了，自动移除标记
                await github.rest.issues.removeLabel({
                  owner, repo, issue_number: issueNumber, name: 'stale'
                }).catch(() => {});
                summary.recovered++;
              }
            }

            // 输出 Summary
            await core.summary
              .addHeading('🧹 任务清理与回收执行报告')
              .addTable([
                ['指标', '数值'],
                ['检测 Issue 总数', summary.checked.toString()],
                ['忽略 Pull Requests', summary.skipped_pr.toString()],
                ['新增 Stale 标记', summary.stale.toString()],
                ['执行自动关闭', summary.closed.toString()],
                ['活跃恢复 (移除标记)', summary.recovered.toString()]
              ])
              .write();
