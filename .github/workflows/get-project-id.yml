name: 获取 Project 相关ID

on:
  workflow_call:

jobs:
  get_ids:
    runs-on: ubuntu-latest
    outputs:
      project_id: ${{ steps.set-ids.outputs.project_id }}
      priority_field_id: ${{ steps.set-ids.outputs.priority_field_id }}
      p3_option_id: ${{ steps.set-ids.outputs.p3_option_id }}
      ddl_field_id: ${{ steps.set-ids.outputs.ddl_field_id }}
    steps:
      - name: 从 GitHub 查询 Project ID
        id: set-ids
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.CICD_PAT }}
          script: |
            const projectName = "创似我算了";
            const org = "Vanishing-Games";

            const result = await github.graphql(`
              query {
                organization(login: "${org}") {
                  projectsV2(first: 20) {
                    nodes {
                      id
                      title
                      fields(first: 20) {
                        nodes {
                          id
                          name
                          ... on ProjectV2SingleSelectField {
                            options {
                              id
                              name
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            `);

            const project = result.organization.projectsV2.nodes.find(p => p.title === projectName);
            if (!project) throw new Error("Project not found");

            const priorityField = project.fields.nodes.find(f => f.name === "优先级");
            const ddlField = project.fields.nodes.find(f => f.name === "DDL");
            const p3Option = priorityField.options.find(o => o.name === "P3");

            // ✅ 设置 step outputs
            core.setOutput("project_id", project.id);
            core.setOutput("priority_field_id", priorityField.id);
            core.setOutput("p3_option_id", p3Option.id);
            core.setOutput("ddl_field_id", ddlField.id);

      - name: 输出到 GitHub Summary
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.CICD_PAT }}
          script: |
            const projectId = "${{ steps.set-ids.outputs.project_id }}";
            const priorityFieldId = "${{ steps.set-ids.outputs.priority_field_id }}";
            const p3OptionId = "${{ steps.set-ids.outputs.p3_option_id }}";
            const ddlFieldId = "${{ steps.set-ids.outputs.ddl_field_id }}";

            core.summary
              .addHeading('获取到的 Project 相关 ID')
              .addList([
                `Project ID: ${projectId}`,
                `Priority Field ID: ${priorityFieldId}`,
                `P3 Option ID: ${p3OptionId}`,
                `DDL Field ID: ${ddlFieldId}`
              ])
              .write();
